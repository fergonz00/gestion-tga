<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestión · TGA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --vw-blue: #001E50;
  --vw-blue-light: #00437A;
  --vw-white: #FFFFFF;
  --vw-grey-1: #F5F5F5;
  --vw-grey-2: #E5E5E5;
  --vw-grey-3: #999999;
  --vw-grey-4: #666666;
  --vw-black: #1A1A1A;
  --green: #10B981;
  --green-soft: #D1FAE5;
  --green-dark: #065F46;
  --orange: #F59E0B;
  --orange-soft: #FEF3C7;
  --orange-dark: #92400E;
  --red: #EF4444;
  --red-soft: #FEE2E2;
  --red-dark: #991B1B;
  --purple: #8B5CF6;
  --purple-soft: #EDE9FE;
  --purple-dark: #5B21B6;
  --radius: 12px;
  --shadow: 0 2px 12px rgba(0,30,80,0.08);
  --shadow-lg: 0 8px 32px rgba(0,30,80,0.12);
  --font: 'DM Sans', sans-serif;
}

* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: var(--font); background: var(--vw-grey-1); color: var(--vw-black); min-height:100vh; -webkit-font-smoothing: antialiased; }
button { font-family: var(--font); cursor: pointer; border: none; }
input, select { font-family: var(--font); }
a { color: inherit; text-decoration: none; }
.hidden { display: none !important; }

/* ========== HEADER ========== */
.app-header {
  background: var(--vw-blue); color: white;
  padding: 14px 20px;
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 100;
}
.app-header .brand { font-size: 17px; font-weight: 700; letter-spacing: -0.3px; }
.app-header .user-info { display: flex; align-items: center; gap: 12px; font-size: 13px; }
.app-header .user-name { opacity: 0.9; }
.app-header button {
  background: rgba(255,255,255,0.15); color: white;
  padding: 8px 14px; border-radius: 6px;
  font-size: 13px; font-weight: 500;
  transition: background 0.2s;
}
.app-header button:hover { background: rgba(255,255,255,0.25); }

.wrap { max-width: 1400px; margin: 0 auto; padding: 24px 20px 60px; }
h2 { font-size: 22px; font-weight: 700; color: var(--vw-blue); margin-bottom: 4px; }
.lead { font-size: 14px; color: var(--vw-grey-4); margin-bottom: 20px; }

/* ========== GATE ========== */
.gate {
  min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
  background: linear-gradient(135deg, var(--vw-blue) 0%, var(--vw-blue-light) 100%);
  padding: 20px;
}
.gate-box {
  background: white; padding: 40px 32px; border-radius: var(--radius);
  width: 100%; max-width: 380px;
  box-shadow: var(--shadow-lg); text-align: center;
}
.gate-box .logo { font-size: 20px; font-weight: 700; color: var(--vw-blue); margin-bottom: 8px; }
.gate-box .msg  { font-size: 14px; color: var(--vw-grey-4); margin-bottom: 20px; }
.gate-box .btn  {
  display: inline-block; background: var(--vw-blue); color: white;
  padding: 10px 18px; border-radius: 6px; font-size: 13px; font-weight: 600;
}

/* ========== TABS ========== */
.tabs {
  display: flex; gap: 4px; border-bottom: 2px solid var(--vw-grey-2);
  margin-bottom: 20px; overflow-x: auto;
}
.tab {
  padding: 12px 18px; background: transparent;
  font-size: 14px; font-weight: 600; color: var(--vw-grey-4);
  border-bottom: 2px solid transparent; margin-bottom: -2px;
  white-space: nowrap; transition: all 0.15s;
}
.tab:hover { color: var(--vw-blue); }
.tab.active { color: var(--vw-blue); border-bottom-color: var(--vw-blue); }
.panel { display: none; }
.panel.active { display: block; }

/* ========== TOOLBAR ========== */
.toolbar {
  display: flex; justify-content: space-between; align-items: center;
  gap: 12px; margin-bottom: 14px; flex-wrap: wrap;
}
.toolbar .updated { font-size: 12px; color: var(--vw-grey-3); }
.toolbar .actions { display: flex; gap: 8px; align-items: center; }
.toolbar button.refresh {
  background: var(--vw-blue); color: white;
  padding: 8px 14px; border-radius: 6px;
  font-size: 13px; font-weight: 600;
}
.toolbar button.refresh:hover { background: var(--vw-blue-light); }
.toolbar button.refresh:disabled { opacity: 0.6; cursor: not-allowed; }

/* ========== KPI CARDS ========== */
.cards {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 14px; margin-bottom: 22px;
}
.card {
  background: white; border-radius: var(--radius);
  padding: 16px 16px 14px; box-shadow: var(--shadow);
}
.card .label {
  font-size: 11px; color: var(--vw-grey-3);
  text-transform: uppercase; letter-spacing: 0.6px;
  font-weight: 600; margin-bottom: 6px;
}
.card .value {
  font-size: 24px; font-weight: 700; color: var(--vw-blue);
  letter-spacing: -0.5px; line-height: 1.1;
}
.card .sub { font-size: 12px; color: var(--vw-grey-4); margin-top: 4px; }
.card.warn .value { color: var(--orange); }
.card.bad  .value { color: var(--red); }
.card.good .value { color: var(--green); }

/* ========== FILTROS ========== */
.filter-row {
  display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 16px;
  align-items: center;
}
.filter-group {
  display: flex; gap: 6px; align-items: center; flex-wrap: wrap;
}
.filter-group .lbl {
  font-size: 11px; color: var(--vw-grey-3);
  text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600;
  margin-right: 4px;
}
.chip {
  padding: 6px 12px; background: white; color: var(--vw-grey-4);
  border: 1px solid var(--vw-grey-2); border-radius: 100px;
  font-size: 12px; font-weight: 500;
}
.chip:hover { border-color: var(--vw-grey-3); }
.chip.active { background: var(--vw-blue); color: white; border-color: var(--vw-blue); }

.search {
  display: flex; align-items: center; gap: 6px;
  background: white; border: 1px solid var(--vw-grey-2);
  border-radius: 100px; padding: 4px 12px;
  min-width: 220px; flex: 1 1 220px; max-width: 320px;
}
.search input {
  flex: 1; border: none; outline: none;
  font-size: 13px; padding: 6px 4px;
  background: transparent;
}

/* ========== TABLA STOCK ========== */
.table-wrap {
  background: white; border-radius: var(--radius);
  box-shadow: var(--shadow); overflow: hidden;
}
.table-wrap .table-head {
  padding: 12px 16px; border-bottom: 1px solid var(--vw-grey-2);
  display: flex; justify-content: space-between; align-items: center;
  flex-wrap: wrap; gap: 8px;
}
.table-wrap .table-head h3 { font-size: 14px; font-weight: 600; color: var(--vw-blue); }
.table-wrap .table-head .count { font-size: 12px; color: var(--vw-grey-4); }
.table-scroll { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 12.5px; }
thead th {
  background: var(--vw-grey-1); color: var(--vw-grey-4);
  font-size: 10.5px; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.4px;
  padding: 9px 10px; text-align: left;
  border-bottom: 1px solid var(--vw-grey-2);
  white-space: nowrap;
}
thead th.num, tbody td.num { text-align: right; font-variant-numeric: tabular-nums; }
thead th.ctr, tbody td.ctr { text-align: center; }
tbody tr { border-bottom: 1px solid var(--vw-grey-2); }
tbody tr:hover { background: var(--vw-grey-1); }
tbody td { padding: 10px 10px; vertical-align: middle; }
tbody tr.expo { background: linear-gradient(to right, rgba(139,92,246,0.06), transparent 280px); }
tbody tr.expo:hover { background: linear-gradient(to right, rgba(139,92,246,0.12), var(--vw-grey-1) 280px); }

.serie { font-weight: 600; color: var(--vw-blue); font-family: monospace; font-size: 12px; }
.muted { color: var(--vw-grey-3); font-size: 11px; }

/* Badges */
.badge {
  display: inline-block; font-size: 10px; font-weight: 700;
  padding: 3px 8px; border-radius: 100px;
  text-transform: uppercase; letter-spacing: 0.4px;
  white-space: nowrap;
}
.badge.paga    { background: var(--green-soft);  color: var(--green-dark); }
.badge.impaga  { background: var(--red-soft);    color: var(--red-dark); }
.badge.otro    { background: var(--vw-grey-2);   color: var(--vw-grey-4); }
.badge.vendido { background: var(--vw-grey-2);   color: var(--vw-grey-4); }
.badge.stock   { background: var(--green-soft);  color: var(--green-dark); }
.badge.expo-er { background: var(--orange-soft); color: var(--orange-dark); }
.badge.expo-in { background: var(--purple-soft); color: var(--purple-dark); }

/* Aviso sobre la grilla cuando hay vendidas que siguen en exposición */
.aviso-reemplazar {
  background: var(--orange-soft); color: var(--orange-dark);
  padding: 10px 16px; border-radius: 8px;
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 14px; font-size: 13px;
  border-left: 4px solid var(--orange);
}
.aviso-reemplazar .ico { font-size: 18px; }
.aviso-reemplazar b { font-weight: 700; }

/* Badges adicionales */
.badge.reemplazar {
  background: var(--red-soft); color: var(--red-dark);
  animation: pulse 1.8s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50%      { opacity: 0.65; }
}
tbody tr.vendida-en-expo { background: rgba(239, 68, 68, 0.04); }
tbody tr.vendida-en-expo:hover { background: rgba(239, 68, 68, 0.08); }

/* KPI cards extras para los salones */
.card.expo-in .value { color: var(--purple-dark); }
.card.expo-er .value { color: var(--orange-dark); }

/* Botón de toggle de la calculadora */
.calc-toggle {
  background: var(--vw-blue); color: white;
  padding: 8px 16px; border-radius: 100px;
  font-size: 13px; font-weight: 600;
  display: inline-flex; align-items: center; gap: 6px;
  white-space: nowrap;
}
.calc-toggle:hover { background: var(--vw-blue-light); }

/* Checkbox "Vista resumida" en la toolbar */
.toggle-resumida {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 12px; color: var(--vw-grey-4); font-weight: 600;
  padding: 6px 12px; background: white;
  border: 1px solid var(--vw-grey-2); border-radius: 100px;
  cursor: pointer; user-select: none;
}
.toggle-resumida:hover { border-color: var(--vw-grey-3); color: var(--vw-blue); }
.toggle-resumida input { cursor: pointer; }

/* Cuando la tabla está en modo "resumida" ocultamos las columnas marcadas
   como col-extra. Funciona tanto en desktop (tabla) como en mobile (cards
   apiladas), porque el selector aplica a th/td indistintamente. */
table.stock-tbl.resumida  .col-extra,
table.ventas-tbl.resumida .col-extra { display: none; }

/* ========== VENTAS ========== */
.mes-row {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 16px; flex-wrap: wrap;
}
.mes-row label {
  font-size: 11px; color: var(--vw-grey-3); font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.5px;
}
.mes-row select {
  padding: 9px 14px; border: 1px solid var(--vw-grey-2);
  border-radius: 8px; font-size: 13px; font-weight: 600;
  background: white; outline: none; color: var(--vw-blue);
  min-width: 220px;
}
.mes-row select:focus { border-color: var(--vw-blue); }
table.ventas-tbl tbody td.gcia-pos { color: var(--green-dark); font-weight: 600; }

/* Botón toggle del ranking */
.rank-toggle {
  background: var(--vw-blue); color: white;
  padding: 8px 14px; border-radius: 100px;
  font-size: 13px; font-weight: 600;
  display: inline-flex; align-items: center; gap: 6px;
  white-space: nowrap;
}
.rank-toggle:hover { background: var(--vw-blue-light); }
.rank-toggle.open { background: var(--green); }
.rank-toggle.open:hover { background: var(--green-dark); }

/* Ranking de vendedores */
.ranking-wrap {
  background: white; border-radius: var(--radius);
  box-shadow: var(--shadow); padding: 18px 20px;
  margin-bottom: 22px;
}
.ranking-head {
  display: flex; justify-content: space-between; align-items: baseline;
  margin-bottom: 12px; flex-wrap: wrap; gap: 8px;
}
.ranking-head h3 { font-size: 16px; font-weight: 700; color: var(--vw-blue); }
.ranking-head .muted { font-size: 12px; color: var(--vw-grey-4); }
table.ranking-tbl { width: 100%; border-collapse: collapse; font-size: 13.5px; }
table.ranking-tbl thead th {
  font-size: 10.5px; font-weight: 600;
  color: var(--vw-grey-4); text-transform: uppercase; letter-spacing: 0.4px;
  padding: 6px 10px; text-align: left;
  border-bottom: 1px solid var(--vw-grey-2);
  background: transparent;
}
table.ranking-tbl thead th.num { text-align: right; }
table.ranking-tbl thead th.ctr { text-align: center; }
table.ranking-tbl tbody td {
  padding: 9px 10px; border-bottom: 1px solid var(--vw-grey-2);
  font-variant-numeric: tabular-nums;
}
table.ranking-tbl tbody td.num { text-align: right; }
table.ranking-tbl tbody td.ctr { text-align: center; }
table.ranking-tbl tbody td.pos {
  font-weight: 700; color: var(--vw-grey-3); width: 32px;
}
table.ranking-tbl tbody td.vname { font-weight: 600; color: var(--vw-black); }
table.ranking-tbl tbody tr.top td.pos    { color: var(--green); font-size: 16px; }
table.ranking-tbl tbody tr.top td.vname  { color: var(--vw-blue); }
table.ranking-tbl tbody tr.zero td       { color: var(--vw-grey-3); }
table.ranking-tbl tbody tr.zero td.vname { color: var(--vw-grey-4); font-weight: 500; }

.ranking-otros {
  margin-top: 14px; padding: 12px 16px;
  background: var(--orange-soft); color: var(--orange-dark);
  border-radius: 8px; border-left: 4px solid var(--orange);
  font-size: 12px;
}
.ranking-otros .hd { font-weight: 700; font-size: 13px; margin-bottom: 4px; }
.ranking-otros .dd { margin-bottom: 8px; line-height: 1.5; }
.ranking-otros ul { list-style: disc inside; padding-left: 0; }
.ranking-otros li { padding: 2px 0; }

/* ========== PATENTAMIENTOS ========== */
.kpi-input {
  width: 100%; max-width: 110px;
  padding: 4px 8px; border: 1px solid var(--vw-blue);
  border-radius: 6px; font-size: 20px; font-weight: 700;
  color: var(--vw-blue); background: white;
  font-variant-numeric: tabular-nums;
  font-family: var(--font);
}
.kpi-input:focus { outline: 2px solid var(--vw-blue); }

.pat-filterinfo {
  background: var(--vw-blue); color: white;
  padding: 8px 14px; border-radius: 8px;
  font-size: 13px; margin-bottom: 14px;
}

.pat-progress {
  background: white; padding: 16px 20px; border-radius: var(--radius);
  box-shadow: var(--shadow); margin-bottom: 18px;
}
.pat-progress .prow {
  display: grid; grid-template-columns: 220px 1fr 180px;
  align-items: center; gap: 14px; padding: 8px 0;
}
.pat-progress .prow .lab { font-size: 12px; color: var(--vw-grey-4); font-weight: 600; }
.pat-progress .prow .bar {
  height: 14px; background: var(--vw-grey-1); border-radius: 100px;
  overflow: hidden;
}
.pat-progress .prow .fill {
  height: 100%; border-radius: 100px; transition: width 0.4s ease;
}
.pat-progress .prow .fill.good    { background: linear-gradient(90deg, var(--green), var(--green-dark)); }
.pat-progress .prow .fill.neutral { background: linear-gradient(90deg, var(--vw-blue-light), var(--vw-blue)); }
.pat-progress .prow .val {
  font-size: 12.5px; color: var(--vw-grey-4); text-align: right;
  font-variant-numeric: tabular-nums;
}
@media (max-width: 700px) {
  .pat-progress .prow {
    grid-template-columns: 1fr; gap: 4px; padding: 10px 0;
  }
  .pat-progress .prow .val { text-align: left; }
}

.desgloses {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 14px; margin-bottom: 22px;
}
.desg {
  background: white; padding: 14px 16px; border-radius: var(--radius);
  box-shadow: var(--shadow);
}
.desg .hd {
  font-size: 11px; color: var(--vw-grey-3);
  text-transform: uppercase; letter-spacing: 0.5px; font-weight: 700;
  margin-bottom: 12px; padding-bottom: 8px;
  border-bottom: 1px solid var(--vw-grey-2);
}
.desg .hd .hd-sub {
  color: var(--vw-blue, #001e50); font-weight: 800;
  text-transform: none; letter-spacing: 0; font-size: 12px;
}
h4.desg-title {
  margin: 8px 0 10px; font-size: 14px; font-weight: 700;
  color: var(--vw-grey-3); text-transform: uppercase; letter-spacing: 0.5px;
}

/* Resumen — vista panorámica */
.resumen-block {
  margin-bottom: 28px;
}
.resumen-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 12px; gap: 12px; flex-wrap: wrap;
}
.resumen-head h3 {
  font-size: 16px; font-weight: 700; color: var(--vw-blue);
  letter-spacing: -0.2px;
}
.resumen-link {
  background: white; border: 1px solid var(--vw-grey-2);
  padding: 6px 14px; border-radius: var(--radius);
  font-size: 12px; font-weight: 600; color: var(--vw-blue);
  cursor: pointer; transition: all 0.15s;
}
.resumen-link:hover {
  background: var(--vw-blue); color: white; border-color: var(--vw-blue);
}
.resumen-loading {
  background: white; padding: 18px; border-radius: var(--radius);
  color: var(--vw-grey-3); text-align: center; font-size: 13px;
  box-shadow: var(--shadow);
}
.desg .empty-mini { font-size: 12px; color: var(--vw-grey-3); padding: 8px 0; }
.desg .dr {
  display: grid; grid-template-columns: minmax(0, 90px) 1fr auto;
  align-items: center; gap: 10px; padding: 5px 0;
  font-size: 12px;
}
.desg .dr-k {
  color: var(--vw-black); font-weight: 600; font-size: 11.5px;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.desg .dr-bar {
  height: 8px; background: var(--vw-grey-1); border-radius: 100px;
  overflow: hidden;
}
.desg .dr-fill {
  height: 100%; background: var(--vw-blue);
  border-radius: 100px; transition: width 0.3s ease;
}
.desg .dr-v {
  font-size: 11.5px; color: var(--vw-grey-4);
  font-variant-numeric: tabular-nums; white-space: nowrap;
}

/* Resumida en patentamientos: oculta col-extra (Serie/Admin/Tipo/Rev-Part/Cliente/Dominio) */
table.patent-tbl.resumida .col-extra { display: none; }

/* Sección de calculadora (arriba de la tabla, no inline) */
.calc-section {
  background: white; border-radius: var(--radius);
  padding: 18px 20px 20px; margin-bottom: 18px;
  box-shadow: var(--shadow);
  border-top: 3px solid var(--vw-blue);
}
.calc-section-head h3 {
  font-size: 18px; font-weight: 700; color: var(--vw-blue); margin-bottom: 4px;
}
.calc-section-head p {
  font-size: 12px; color: var(--vw-grey-4); margin-bottom: 14px; line-height: 1.5;
}
.calc-back {
  background: transparent; color: var(--vw-grey-4);
  padding: 6px 12px 6px 8px; border-radius: 6px;
  font-size: 12px; font-weight: 600;
  margin-bottom: 12px;
}
.calc-back:hover { background: var(--vw-grey-1); color: var(--vw-blue); }
.calc-select-row {
  display: flex; align-items: center; gap: 10px; margin-bottom: 14px;
  flex-wrap: wrap;
}
.calc-select-row label {
  font-size: 12px; color: var(--vw-grey-4); font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.5px;
}
.calc-select-row select,
.calc-select-row .calc-combo {
  flex: 1; min-width: 240px;
  padding: 9px 12px; border: 1px solid var(--vw-grey-2);
  border-radius: 8px; font-size: 13px;
  background: white; outline: none;
}
.calc-select-row select:focus,
.calc-select-row .calc-combo:focus { border-color: var(--vw-blue); }
.calc-clear {
  background: var(--vw-grey-1); color: var(--vw-grey-4);
  padding: 8px 12px; border-radius: 8px;
  font-size: 13px; font-weight: 600;
  flex: 0 0 auto;
}
.calc-clear:hover { background: var(--vw-grey-2); color: var(--red); }

/* Contexto numérico de la unidad elegida */
.calc-ctx-row {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
  gap: 10px; margin-bottom: 14px;
  background: var(--vw-grey-1); padding: 12px 14px; border-radius: 8px;
}
.calc-ctx-row > div {
  display: flex; flex-direction: column; gap: 2px;
}
.calc-ctx-row .lab {
  font-size: 10px; color: var(--vw-grey-3);
  text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600;
}
.calc-ctx-row .val {
  font-size: 14px; font-weight: 700; color: var(--vw-black);
  font-variant-numeric: tabular-nums;
}

.calc-box {
  display: grid; grid-template-columns: 1fr 1fr; gap: 14px;
}
@media (max-width: 800px) { .calc-box { grid-template-columns: 1fr; } }
.calc-block {
  background: var(--vw-grey-1); padding: 14px 16px; border-radius: 8px;
  border: 1px solid var(--vw-grey-2);
}
.calc-block .ttl {
  font-size: 11px; color: var(--vw-grey-3);
  text-transform: uppercase; letter-spacing: 0.5px;
  font-weight: 600; margin-bottom: 10px;
}
.calc-input-row {
  display: flex; gap: 8px; align-items: center; margin-bottom: 12px;
}
.calc-input-row label {
  font-size: 12px; color: var(--vw-grey-4); flex: 0 0 auto;
}
.calc-input-row .ipt {
  flex: 1; padding: 7px 10px;
  border: 1px solid var(--vw-grey-2); border-radius: 6px;
  font-size: 13px; outline: none;
  font-variant-numeric: tabular-nums;
  background: white;
}
.calc-input-row .ipt:focus { border-color: var(--vw-blue); }
.calc-result {
  background: white; border-radius: 6px;
  padding: 10px 12px; font-size: 13px;
  display: flex; justify-content: space-between; align-items: center;
  border: 1px solid var(--vw-grey-2);
}
.calc-result .lab { color: var(--vw-grey-4); font-size: 12px; }
.calc-result .val { font-weight: 700; font-size: 18px; font-variant-numeric: tabular-nums; }
.calc-result.good .val { color: var(--green); }
.calc-result.bad  .val { color: var(--red); }
.calc-result.neutral .val { color: var(--vw-blue); }
.calc-result .delta { font-size: 11px; color: var(--vw-grey-4); margin-left: 8px; }

/* Loading / error */
.loading {
  text-align: center; padding: 60px 20px;
  color: var(--vw-grey-4); font-size: 14px;
}
.spinner {
  display: inline-block; width: 28px; height: 28px;
  border: 3px solid var(--vw-grey-2); border-top-color: var(--vw-blue);
  border-radius: 50%; animation: spin 0.7s linear infinite;
  margin-bottom: 12px;
}
@keyframes spin { to { transform: rotate(360deg); } }
.errbox {
  background: var(--red-soft); color: var(--red-dark);
  padding: 18px 22px; border-radius: var(--radius);
  font-size: 13px; line-height: 1.5;
}
.errbox .ttl { font-weight: 700; margin-bottom: 4px; font-size: 14px; }
.errbox code {
  background: rgba(0,0,0,0.08); padding: 1px 6px;
  border-radius: 4px; font-size: 12px;
}

.empty {
  text-align: center; padding: 40px 20px;
  color: var(--vw-grey-3); font-size: 13px;
}

.placeholder {
  background: white; border-radius: var(--radius);
  padding: 60px 20px; text-align: center;
  box-shadow: var(--shadow); color: var(--vw-grey-4);
}
.placeholder .ico { font-size: 40px; margin-bottom: 12px; opacity: 0.5; }
.placeholder .ttl { font-size: 16px; font-weight: 600; color: var(--vw-blue); margin-bottom: 6px; }

/* ================== RESPONSIVE ==================
 *
 * Por debajo de 900px transformamos la tabla en cards verticales apiladas.
 * Cada <tr> es una card; cada <td> es una fila "label: value" usando data-label.
 * Así nunca hay scroll lateral, ni en celular ni en ventanas chicas.
 */
@media (max-width: 900px) {
  .wrap { padding: 16px 12px 40px; }
  .card .value { font-size: 20px; }
  .filter-row { gap: 10px; }
  .table-scroll { overflow-x: visible; }
  .table-wrap .table-head { padding: 12px 14px; }

  /* Tablas responsivas — aplica a stock y ventas por igual */
  table.responsive-cards thead { display: none; }
  table.responsive-cards,
  table.responsive-cards tbody { display: block; width: 100%; }
  table.responsive-cards tr {
    display: block;
    border: 1px solid var(--vw-grey-2);
    border-radius: 10px;
    margin: 10px 12px;
    padding: 12px 14px;
    background: white;
    box-shadow: 0 1px 4px rgba(0,30,80,0.04);
  }
  table.responsive-cards tr.expo {
    background: linear-gradient(to bottom, rgba(139,92,246,0.05), white 60px);
    border-left: 3px solid var(--purple);
  }
  table.responsive-cards tr.vendida-en-expo {
    background: rgba(239,68,68,0.05);
    border-left: 3px solid var(--red);
  }
  table.responsive-cards tr:hover { background: white; }
  table.responsive-cards tr.expo:hover {
    background: linear-gradient(to bottom, rgba(139,92,246,0.08), white 60px);
  }

  table.responsive-cards td {
    display: flex; justify-content: space-between; align-items: center;
    padding: 6px 0; border: none;
    text-align: right !important;
    gap: 12px;
  }
  table.responsive-cards td::before {
    content: attr(data-label);
    font-size: 10.5px; font-weight: 600;
    color: var(--vw-grey-3);
    text-transform: uppercase; letter-spacing: 0.4px;
    flex: 0 0 auto;
  }
  /* La serie va destacada arriba sin label */
  table.responsive-cards td[data-label="Serie"] {
    padding-top: 0; padding-bottom: 8px;
    margin-bottom: 6px; border-bottom: 1px dashed var(--vw-grey-2);
    font-size: 14px;
  }
  table.responsive-cards td[data-label="Serie"]::before { display: none; }
  table.responsive-cards td[data-label="Serie"] .serie { font-size: 14px; }
  /* Unidad / Modelo ocupan una fila completa, alineadas a la izquierda */
  table.responsive-cards td[data-label="Unidad"],
  table.responsive-cards td[data-label="Modelo"] {
    display: block; padding: 4px 0 8px;
    text-align: left !important;
    font-weight: 600; color: var(--vw-blue);
  }
  table.responsive-cards td[data-label="Unidad"]::before,
  table.responsive-cards td[data-label="Modelo"]::before {
    display: block; margin-bottom: 2px;
  }
}


/* Incentivos — upload de PDFs */
.upload-zone {
  background: white; border: 2px dashed var(--vw-grey-2); border-radius: var(--radius);
  padding: 30px; text-align: center; transition: all 0.2s; margin-bottom: 18px;
}
.upload-zone.over { border-color: var(--vw-blue); background: #f0f6ff; }
.upload-zone input[type=file] { display: none; }
.upload-zone .upload-btn {
  background: var(--vw-blue); color: white; padding: 10px 20px; border-radius: 6px;
  font-size: 13px; font-weight: 600; border: none; cursor: pointer; margin-top: 8px;
}
.upload-zone .upload-btn:hover { background: var(--vw-blue-light); }
.upload-progress { font-size: 12px; color: var(--vw-grey-3); margin-top: 8px; }
.parsed-summary {
  background: #f0f6ff; border-left: 3px solid var(--vw-blue); padding: 10px 14px;
  border-radius: 6px; margin: 12px 0; font-size: 13px;
}
.parsed-summary b { color: var(--vw-blue); }
.tipo-badge {
  display: inline-block; padding: 2px 8px; border-radius: 100px;
  font-size: 10px; font-weight: 700; text-transform: uppercase;
}
.tipo-badge.cc90       { background: #d6eaff; color: #003a75; }
.tipo-badge.tactico    { background: #d4f4e2; color: #0a6b3a; }
.tipo-badge.adicional1 { background: #ffe9d6; color: #8a4500; }
.tipo-badge.adicional2 { background: #ffd9d9; color: #8a0000; }
.tipo-badge.whosale    { background: #e9d6ff; color: #4a008a; }
.tipo-badge.desconocido { background: #f0f0f0; color: #666; }
.match-warn { color: #cc6600; font-size: 10px; margin-left: 4px; }
</style>

<!-- pdf.js para parsing client-side de los NCs -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
  if (typeof pdfjsLib !== 'undefined') {
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  }
</script>
</head>
<body>

<!-- ==================== GATE ==================== -->
<div id="gateScreen" class="gate hidden">
  <div class="gate-box">
    <div class="logo">Gestión TGA</div>
    <div class="msg" id="gateMsg">Esta vista es privada.</div>
    <a class="btn" href="https://titogonzalez.online">← Volver al portal</a>
  </div>
</div>

<!-- ==================== APP ==================== -->
<div id="appScreen" class="hidden">
  <header class="app-header">
    <div class="brand">📊 Gestión TGA</div>
    <div class="user-info">
      <span class="user-name" id="userName"></span>
      <button onclick="window.location.href='https://titogonzalez.online'">← Portal</button>
      <button onclick="logout()">Salir</button>
    </div>
  </header>

  <main class="wrap">
    <h2>Stock, ventas y patentamientos</h2>

    <div class="tabs">
      <button class="tab active" data-tab="resumen" onclick="setTab('resumen')">Resumen</button>
      <button class="tab" data-tab="stock" onclick="setTab('stock')">Stock</button>
      <button class="tab" data-tab="ventas" onclick="setTab('ventas')">Ventas</button>
      <button class="tab" data-tab="patentamientos" onclick="setTab('patentamientos')">Patentamientos</button>
      <button class="tab" data-tab="incentivos" onclick="setTab('incentivos')">Incentivos</button>
    </div>

    <!-- =================== RESUMEN =================== -->
    <section class="panel active" id="panelResumen">
      <div class="toolbar">
        <div class="updated">Vista panorámica de las 3 secciones</div>
        <div class="actions">
          <button class="refresh" id="btnRefreshResumen" onclick="refreshResumen()">Actualizar todo</button>
        </div>
      </div>
      <div id="resumenContent"></div>
    </section>

    <!-- =================== STOCK =================== -->
    <section class="panel" id="panelStock">
      <div class="toolbar">
        <div class="updated" id="updatedAtStock">—</div>
        <div class="actions">
          <button class="refresh" id="btnRefreshStock" onclick="loadStock(true)">Actualizar</button>
        </div>
      </div>
      <div id="stockContent"></div>
    </section>

    <!-- =================== VENTAS =================== -->
    <section class="panel" id="panelVentas">
      <div class="toolbar">
        <div class="updated" id="updatedAtVentas">—</div>
        <div class="actions">
          <button class="refresh" id="btnRefreshVentas" onclick="loadVentas(true)">Actualizar</button>
        </div>
      </div>
      <div id="ventasContent"></div>
    </section>

    <!-- =================== PATENTAMIENTOS =================== -->
    <section class="panel" id="panelPatentamientos">
      <div class="toolbar">
        <div class="updated" id="updatedAtPatent">—</div>
        <div class="actions">
          <button class="refresh" id="btnRefreshPatent" onclick="loadPatentamientos(true)">Actualizar</button>
        </div>
      </div>
      <div id="patentContent"></div>
    </section>

    <!-- =================== INCENTIVOS =================== -->
    <section class="panel" id="panelIncentivos">
      <div class="toolbar">
        <div class="updated" id="updatedAtIncentivos">—</div>
        <div class="actions">
          <button class="refresh" id="btnRefreshIncentivos" onclick="loadIncentivos(true)">Actualizar</button>
        </div>
      </div>
      <div id="incentivosContent"></div>
    </section>
  </main>
</div>

<script>
// =======================================================================
// CONFIG
// =======================================================================
const SHARED_COOKIE = 'tga_session';
const SHARED_DOMAIN = '.titogonzalez.online';
const USUARIOS_PERMITIDOS = ['fngonzalez', 'fgonzalez'];

// URL del Web App publicado desde el Apps Script de la planilla espejo.
// Pendiente: pegar acá la URL que devuelve "Deploy → Web app" en el editor de Apps Script.
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwL1T3T3_u4NXRFOXa-sdc0hAnXdCI-qjWRhi0t5yTjFNzCAvbpPHUSNKLk7sicECIv6g/exec';
const APPS_SCRIPT_TOKEN = 'tga-gestion-R7nQ4xK8jL';

// =======================================================================
// ESTADO
// =======================================================================
let stockData = null;          // { unidades, updatedAt }

// Calculadora (sección aparte, no inline en la tabla)
let calcOpen = false;          // si la sección de la calculadora está visible
let calcSerie = '';            // serie de la unidad elegida en el desplegable

// Vista resumida del stock: solo serie, antig., unidad y color
let vistaResumida = false;

// Ventas
let ventasData = null;            // { ventas, meses, mesActual, updatedAt }
let mesSeleccionado = '';         // 'yyyy-mm'
let vistaResumidaVentas = false;  // oculta IVA / acc / costo / serie / color
let rankingOpen = false;          // toggle de la sección "Ranking de vendedores"

// Patentamientos
let patentData = null;            // { carpetas, meses, mesActual, updatedAt }
let mesSelPat = '';
let vendedorFiltroPat = '';       // filtro por vendedor (drill-down)
let vistaResumidaPat = false;     // toggle vista resumida en patentamientos

// Incentivos
let incentivosData = null;        // { porUnidadPatentada, porUnidadComprada, modelosBT, ... }
let mesSelInc = '';               // mes seleccionado en la tab
let al100Inc = false;             // toggle 100% objetivo (afecta CC 90 → /0.9)
let vistaResumidaInc = false;     // ocultar cols extra
let incentivosDataByMes = {};     // cache de BT data por mes para matching multi-mes
let pagosParseados = [];          // pagos parseados pero NO guardados aún (preview)
let parseStatus = '';             // texto de progreso del upload
// Objetivos del mes (cantidad de carpetas a patentar). Defaults pasados por
// Fer; persistidos en localStorage para que pueda editarlos vivo.
const OBJETIVOS_PAT_DEFAULT = { '2026-04': 63, '2026-05': 54 };
let objetivosPat = (() => {
  try {
    const s = localStorage.getItem('gestion_objetivos_pat');
    return s ? Object.assign({}, OBJETIVOS_PAT_DEFAULT, JSON.parse(s)) : Object.assign({}, OBJETIVOS_PAT_DEFAULT);
  } catch { return Object.assign({}, OBJETIVOS_PAT_DEFAULT); }
})();
function saveObjetivosPat() {
  try { localStorage.setItem('gestion_objetivos_pat', JSON.stringify(objetivosPat)); } catch {}
}

// Filtros activos
let filtros = {
  search:    '',
  pago:      'todas',  // 'todas' | 'pagas' | 'impagas'
  expo:      'todas',  // 'todas' | 'indep' | 'erios' | 'expuestas'
};

// =======================================================================
// CACHE EN LOCALSTORAGE
// =======================================================================
// Para que el primer pintado después de un reload sea instantáneo: guardo el
// último response de cada endpoint y lo restauro al abrir. El fetch fresco
// corre en background y vuelve a renderizar cuando llega (rápido, gracias al
// CacheService del Apps Script). El botón "Actualizar" siempre va con fresh=1.
const LS_CACHE_KEYS = {
  stock:          'gestion_cache_stock',
  ventas:         'gestion_cache_ventas',
  patentamientos: 'gestion_cache_patent',
  incentivos:     'gestion_cache_incent',
};
function lsCacheGet(tipo) {
  try {
    const raw = localStorage.getItem(LS_CACHE_KEYS[tipo]);
    return raw ? JSON.parse(raw) : null;
  } catch { return null; }
}
function lsCacheSet(tipo, data) {
  try { localStorage.setItem(LS_CACHE_KEYS[tipo], JSON.stringify(data)); }
  catch { /* quota lleno, lo dejamos pasar */ }
}

// =======================================================================
// SESIÓN (cookie SSO compartida)
// =======================================================================
function getSharedCookie() {
  const m = document.cookie.match(new RegExp('(?:^|;\\s*)' + SHARED_COOKIE + '=([^;]+)'));
  if (!m) return null;
  try { return JSON.parse(decodeURIComponent(m[1])); } catch { return null; }
}
function clearSharedCookie() {
  document.cookie = SHARED_COOKIE + '=; path=/; domain=' + SHARED_DOMAIN + '; max-age=0; Secure; SameSite=Lax';
}
function showGate(msg) {
  document.getElementById('gateMsg').textContent = msg || 'Esta vista es privada.';
  document.getElementById('appScreen').classList.add('hidden');
  document.getElementById('gateScreen').classList.remove('hidden');
}
function enterApp(session) {
  document.getElementById('gateScreen').classList.add('hidden');
  document.getElementById('appScreen').classList.remove('hidden');
  document.getElementById('userName').textContent = session.nombre || session.usuario;
  setTab('resumen');
  startAutoRefresh();
}

// Auto-refresh cada 10 minutos. Refresca solo la tab activa, en background
// (sin spinner ni pantalla en blanco). Si la calc está abierta no toco stock.
const AUTO_REFRESH_MS = 10 * 60 * 1000;
let _autoRefreshTimer = null;
function startAutoRefresh() {
  if (_autoRefreshTimer) clearInterval(_autoRefreshTimer);
  _autoRefreshTimer = setInterval(() => {
    const activo = document.querySelector('.tab.active')?.dataset.tab;
    if (activo === 'resumen') {
      if (!calcOpen) _fetchStockSilent();
      _fetchVentasSilent();
      _fetchPatentSilent();
    } else if (activo === 'stock' && !calcOpen) {
      _fetchStockSilent();
    } else if (activo === 'ventas') {
      _fetchVentasSilent();
    } else if (activo === 'patentamientos') {
      _fetchPatentSilent();
    } else if (activo === 'incentivos') {
      _fetchIncentivosSilent();
    }
  }, AUTO_REFRESH_MS);
}
function logout() {
  clearSharedCookie();
  try { localStorage.removeItem('portal_tga_session'); } catch {}
  window.location.href = 'https://titogonzalez.online';
}

// =======================================================================
// TABS
// =======================================================================
function setTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  const map = {
    resumen:        'panelResumen',
    stock:          'panelStock',
    ventas:         'panelVentas',
    patentamientos: 'panelPatentamientos',
    incentivos:     'panelIncentivos',
  };
  const el = document.getElementById(map[tab]);
  if (el) el.classList.add('active');
  // Lazy load por tab
  if (tab === 'resumen')                          loadResumen();
  if (tab === 'stock'          && !stockData)    loadStock(false);
  if (tab === 'ventas'         && !ventasData)   loadVentas(false);
  if (tab === 'patentamientos' && !patentData)   loadPatentamientos(false);
  if (tab === 'incentivos'     && !incentivosData) loadIncentivos(false);
}

// =======================================================================
// RESUMEN · vista panorámica (Stock + Ventas + Patentamientos)
// =======================================================================
// No tiene endpoint propio: reusa los datos cargados de las otras 3 tabs.
// Cada loadX/_fetchXSilent llama a renderResumen() al final, así esta tab
// se actualiza sola cuando alguna sección refresca.

function loadResumen() {
  // Disparamos las cargas — cada una restaura sincrónicamente de localStorage
  // si hay cache, así renderResumen() de abajo pinta inmediatamente.
  if (!stockData)  loadStock(false);
  if (!ventasData) loadVentas(false);
  if (!patentData) loadPatentamientos(false);
  renderResumen();
}

function refreshResumen() {
  const btn = document.getElementById('btnRefreshResumen');
  if (btn) { btn.disabled = true; btn.textContent = 'Actualizando...'; }
  Promise.all([
    _fetchStockSilent(),
    _fetchVentasSilent(),
    _fetchPatentSilent(),
  ]).finally(() => {
    if (btn) { btn.disabled = false; btn.textContent = 'Actualizar todo'; }
  });
}

function renderResumen() {
  const wrap = document.getElementById('resumenContent');
  if (!wrap) return;

  let h = '';

  // ----- STOCK -----
  h += '<div class="resumen-block">';
  h += '  <div class="resumen-head"><h3>Stock</h3>'
     + '    <button class="resumen-link" onclick="setTab(\'stock\')">Ver detalle →</button>'
     + '  </div>';
  if (stockData && Array.isArray(stockData.unidades)) {
    const u = stockData.unidades;
    const enStock = u.filter(x => !x.vendido).length;
    const impagas = u.filter(x => !x.vendido && x.pagoEstado === 'impaga').length;
    const enIndep = u.filter(x => !x.vendido && x.exposicion === 'INDEPENDENCIA').length;
    const enErios = u.filter(x => !x.vendido && x.exposicion === 'ENTRE RIOS').length;
    h += '<div class="cards">';
    h += kpi('Total en stock', enStock, '', 'good');
    h += kpi('Impagas', impagas, impagas ? 'a pagar' : '', impagas ? 'bad' : '');
    h += kpi('Independencia', enIndep, 'en exposición', enIndep ? 'expo-in' : '');
    h += kpi('Entre Ríos',   enErios, 'en exposición', enErios ? 'expo-er' : '');
    h += '</div>';
  } else {
    h += '<div class="resumen-loading">Cargando stock...</div>';
  }
  h += '</div>';

  // ----- VENTAS -----
  h += '<div class="resumen-block">';
  const mesV = (ventasData && (mesSeleccionado || ventasData.mesActual)) || '';
  const mesLabelV = (ventasData && ventasData.meses && ventasData.meses.find(m => m.mesKey === mesV)?.label) || '—';
  h += '  <div class="resumen-head"><h3>Ventas — ' + escapeHtml(mesLabelV) + '</h3>'
     + '    <button class="resumen-link" onclick="setTab(\'ventas\')">Ver detalle →</button>'
     + '  </div>';
  if (ventasData && Array.isArray(ventasData.ventas)) {
    const delMes = ventasData.ventas.filter(v => v.mesKey === mesV);
    const cantidad = delMes.length;
    const gciaPctAvg = delMes.length
      ? delMes.reduce((a, v) => a + (v.gciaVtaPct || 0), 0) / delMes.length
      : 0;
    const ultima = delMes[delMes.length - 1];
    const acumMes = ultima ? ultima.gciaNetaAcum : 0;
    h += '<div class="cards">';
    h += kpi('Ventas en el mes', cantidad, '', cantidad ? 'good' : '');
    h += kpi('Gcia. neta acumulada', fmtPesos(acumMes), 'al cierre del mes', acumMes > 0 ? 'good' : (acumMes < 0 ? 'bad' : ''));
    h += kpi('Gcia. % promedio', fmtPct(gciaPctAvg), '', '');
    h += '</div>';
  } else {
    h += '<div class="resumen-loading">Cargando ventas...</div>';
  }
  h += '</div>';

  // ----- PATENTAMIENTOS -----
  h += '<div class="resumen-block">';
  const mesP = (patentData && (mesSelPat || patentData.mesActual)) || '';
  const mesLabelP = (patentData && patentData.meses && patentData.meses.find(m => m.mesKey === mesP)?.label) || '—';
  h += '  <div class="resumen-head"><h3>Patentamientos — ' + escapeHtml(mesLabelP) + '</h3>'
     + '    <button class="resumen-link" onclick="setTab(\'patentamientos\')">Ver detalle →</button>'
     + '  </div>';
  if (patentData && Array.isArray(patentData.carpetas)) {
    const delMes = patentData.carpetas.filter(c => c.mesKey === mesP);
    const total = delMes.length;
    const patentadas = delMes.filter(c => c.patentada).length;
    const pendientes = total - patentadas;
    const objetivo = objetivosPat[mesP] || 0;
    const restanObj = Math.max(0, objetivo - patentadas);
    h += '<div class="cards">';
    h += kpi('Carpetas del mes', total, '', total ? 'good' : '');
    h += kpi('Patentadas', patentadas, total ? Math.round(patentadas / total * 100) + '% del total' : '', patentadas ? 'good' : '');
    h += kpi('Pendientes', pendientes, '', pendientes ? 'warn' : '');
    if (objetivo > 0) {
      h += '<div class="card"><div class="label">Objetivo del mes</div><div class="value">' + objetivo + '</div><div class="sub">Faltan <b>' + restanObj + '</b></div></div>';
    }
    h += '</div>';
  } else {
    h += '<div class="resumen-loading">Cargando patentamientos...</div>';
  }
  h += '</div>';

  wrap.innerHTML = h;
}

// =======================================================================
// STOCK · fetch
// =======================================================================
async function loadStock(forzar) {
  if (stockData && !forzar) { renderStock(); return; }

  // Primer pintado: si hay cache en localStorage, lo mostramos ya y
  // disparamos el fetch fresco en background (sin spinner).
  if (!stockData && !forzar) {
    const cached = lsCacheGet('stock');
    if (cached) {
      stockData = cached;
      renderStock();
      const upd = document.getElementById('updatedAtStock');
      if (upd && cached.updatedAt) upd.textContent = 'Actualizado: ' + new Date(cached.updatedAt).toLocaleString('es-AR');
      _fetchStockSilent();
      return;
    }
  }

  const btn = document.getElementById('btnRefreshStock');
  const wrap = document.getElementById('stockContent');
  btn.disabled = true; btn.textContent = 'Cargando...';
  wrap.innerHTML = '<div class="loading"><div class="spinner"></div><div>Cargando stock...</div></div>';

  if (APPS_SCRIPT_URL.indexOf('__APPS_SCRIPT_URL_PENDIENTE__') === 0) {
    wrap.innerHTML = '<div class="errbox"><div class="ttl">⚙️ Falta conectar la planilla</div>'
      + '<div>Hay que publicar el Apps Script de la planilla espejo y pegar la URL en <code>index.html</code> (constante <code>APPS_SCRIPT_URL</code>). Ver <code>README.md</code>.</div></div>';
    btn.disabled = false; btn.textContent = 'Actualizar';
    return;
  }

  try {
    const url = APPS_SCRIPT_URL + '?token=' + encodeURIComponent(APPS_SCRIPT_TOKEN) + '&tipo=stock' + (forzar ? '&fresh=1' : '');
    const res = await fetch(url);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    if (data && data.error) throw new Error(data.error);
    stockData = data;
    lsCacheSet('stock', data);
    renderStock();
    const upd = document.getElementById('updatedAtStock');
    if (upd && data.updatedAt) upd.textContent = 'Actualizado: ' + new Date(data.updatedAt).toLocaleString('es-AR');
  } catch (e) {
    console.error(e);
    wrap.innerHTML = '<div class="errbox"><div class="ttl">⚠️ No se pudo cargar el stock</div>'
      + '<div>' + escapeHtml(e.message || String(e)) + '</div></div>';
  } finally {
    btn.disabled = false; btn.textContent = 'Actualizar';
  }
}

// Refresh en background sin spinner. Si la calc está abierta, no toco la UI
// (igual que el auto-refresh original). Pide fresh=1 para evitar caches.
async function _fetchStockSilent() {
  if (APPS_SCRIPT_URL.indexOf('__APPS_SCRIPT_URL_PENDIENTE__') === 0) return;
  try {
    const url = APPS_SCRIPT_URL + '?token=' + encodeURIComponent(APPS_SCRIPT_TOKEN) + '&tipo=stock&fresh=1';
    const res = await fetch(url);
    if (!res.ok) return;
    const data = await res.json();
    if (data && data.error) return;
    stockData = data;
    lsCacheSet('stock', data);
    if (!calcOpen) renderStock();
    else           renderResumen();  // si la calc bloquea el render de stock, al menos actualizo el resumen
    const upd = document.getElementById('updatedAtStock');
    if (upd && data.updatedAt) upd.textContent = 'Actualizado: ' + new Date(data.updatedAt).toLocaleString('es-AR');
  } catch { /* silencioso */ }
}

// =======================================================================
// STOCK · render
// =======================================================================
//
// Reglas de visibilidad de unidades:
//   - Por defecto NO se muestran las vendidas.
//   - Excepción: vendidas con salón asignado en exposición → se muestran con
//     cartel "reemplazar en exposición" para recordar liberar el espacio.
//
// Orden:
//   1) INDEPENDENCIA (por antigüedad desc — más viejas arriba)
//   2) ENTRE RIOS    (idem)
//   3) Resto sin exposición (por antigüedad desc)
//
function renderStock() {
  renderResumen();  // mantener la tab de Resumen sincronizada con los datos actuales
  const wrap = document.getElementById('stockContent');
  if (!stockData || !Array.isArray(stockData.unidades)) {
    wrap.innerHTML = '<div class="empty">Sin datos.</div>';
    return;
  }

  // ===== Modo CALCULADORA exclusiva =====
  // Cuando la calc está abierta no se ve el resto (KPIs, filtros, tabla).
  // Solo la calc + botón "Volver al stock".
  if (calcOpen) {
    wrap.innerHTML = renderCalcSection();
    return;
  }

  // ===== Modo STOCK normal =====
  const todas = stockData.unidades;
  const visibles = aplicarFiltros(todas);

  const enStock = todas.filter(u => !u.vendido).length;
  const impagas = todas.filter(u => !u.vendido && u.pagoEstado === 'impaga').length;
  const enIndep = todas.filter(u => !u.vendido && u.exposicion === 'INDEPENDENCIA').length;
  const enErios = todas.filter(u => !u.vendido && u.exposicion === 'ENTRE RIOS').length;
  const reemplazar = todas.filter(u => u.vendido && u.exposicion).length;

  let html = '';
  html += '<div class="cards">';
  html += kpi('Total en stock', enStock, '', 'good');
  html += kpi('Impagas', impagas, impagas ? 'a pagar' : '', impagas ? 'bad' : '');
  html += kpi('Independencia', enIndep, 'en exposición', enIndep ? 'expo-in' : '');
  html += kpi('Entre Ríos',   enErios, 'en exposición', enErios ? 'expo-er' : '');
  html += '</div>';

  if (reemplazar > 0) {
    html += '<div class="aviso-reemplazar">'
          + '  <span class="ico">🔄</span>'
          + '  <span><b>' + reemplazar + '</b> ' + (reemplazar === 1 ? 'unidad vendida sigue marcada en exposición' : 'unidades vendidas siguen marcadas en exposición') + ' — reemplazalas en la planilla.</span>'
          + '</div>';
  }

  // Toolbar: botón calc + filtros
  html += '<div class="filter-row">';
  html += '  <button class="calc-toggle" onclick="toggleCalcSection()">🧮 Calculadora de precios</button>';
  html += '  <div class="search">'
        + '    <span style="color:var(--vw-grey-3);font-size:13px">🔍</span>'
        + '    <input type="text" id="stockSearch" placeholder="Serie, modelo, color..." value="' + escapeHtml(filtros.search) + '">'
        + '  </div>';
  html += grupoFiltro('Pago', 'pago', [
    {v:'todas',   l:'Todos'},
    {v:'pagas',   l:'Pagas'},
    {v:'impagas', l:'Impagas'},
  ]);
  html += grupoFiltro('Exposición', 'expo', [
    {v:'todas',     l:'Todas'},
    {v:'indep',     l:'Independencia'},
    {v:'erios',     l:'Entre Ríos'},
    {v:'expuestas', l:'Cualquier salón'},
  ]);
  html += '  <label class="toggle-resumida">'
        + '    <input type="checkbox" ' + (vistaResumida ? 'checked' : '') + ' onchange="toggleVistaResumida()"> Vista resumida'
        + '  </label>';
  html += '</div>';

  // Tabla
  html += '<div class="table-wrap">'
        + '  <div class="table-head">'
        + '    <h3>Unidades</h3>'
        + '    <div class="count">' + visibles.length + ' visibles · ' + enStock + ' en stock</div>'
        + '  </div>'
        + '  <div class="table-scroll">'
        + '    <table class="stock-tbl responsive-cards ' + (vistaResumida ? 'resumida' : '') + '">'
        + '      <thead><tr>'
        + '        <th>Serie</th>'
        + '        <th class="ctr">Antig.</th>'
        + '        <th>Unidad</th>'
        + '        <th>Color</th>'
        + '        <th class="num col-extra">$ FC</th>'
        + '        <th class="ctr col-extra">Pago</th>'
        + '        <th class="num col-extra">Oferta</th>'
        + '        <th class="num col-extra">Rdo</th>'
        + '        <th class="num col-extra">Lista</th>'
        + '        <th class="num col-extra">Dto</th>'
        + '        <th class="ctr col-extra">Expo</th>'
        + '      </tr></thead>'
        + '      <tbody>';

  if (!visibles.length) {
    html += '<tr><td colspan="11" class="empty">No hay unidades que coincidan con los filtros.</td></tr>';
  } else {
    const sorted = ordenarUnidades(visibles);
    for (const u of sorted) html += filaUnidad(u);
  }

  html += '      </tbody>'
        + '    </table>'
        + '  </div>'
        + '</div>';

  wrap.innerHTML = html;

  // Wire del search (mantengo el foco al re-render)
  const sinp = document.getElementById('stockSearch');
  if (sinp) {
    sinp.addEventListener('input', (e) => {
      filtros.search = e.target.value;
      renderStock();
      const ns = document.getElementById('stockSearch');
      if (ns) {
        ns.focus();
        ns.setSelectionRange(filtros.search.length, filtros.search.length);
      }
    });
  }
}

// Orden: siempre por antigüedad descendente (más viejas arriba), sin importar
// el salón. Para ver lo de un salón puntual se usa el filtro de exposición.
function ordenarUnidades(arr) {
  return arr.slice().sort((a, b) => (b.antigDias || 0) - (a.antigDias || 0));
}

function kpi(label, value, sub, cls) {
  return '<div class="card ' + (cls || '') + '">'
       + '  <div class="label">' + escapeHtml(label) + '</div>'
       + '  <div class="value">' + escapeHtml(String(value)) + '</div>'
       + (sub ? '  <div class="sub">' + escapeHtml(sub) + '</div>' : '')
       + '</div>';
}

function grupoFiltro(label, key, opts) {
  let h = '<div class="filter-group">';
  h += '<span class="lbl">' + escapeHtml(label) + ':</span>';
  for (const o of opts) {
    const active = filtros[key] === o.v;
    h += '<button class="chip ' + (active ? 'active' : '') + '" onclick="setFiltro(\'' + key + '\', \'' + o.v + '\')">' + escapeHtml(o.l) + '</button>';
  }
  h += '</div>';
  return h;
}
function setFiltro(key, val) {
  filtros[key] = val;
  renderStock();
}

function toggleVistaResumida() {
  vistaResumida = !vistaResumida;
  renderStock();
}

function toggleVistaResumidaVentas() {
  vistaResumidaVentas = !vistaResumidaVentas;
  renderVentas();
}

function toggleRanking() {
  rankingOpen = !rankingOpen;
  renderVentas();
}

function aplicarFiltros(arr) {
  const q = filtros.search.trim().toLowerCase();
  return arr.filter(u => {
    // Regla base: no mostrar vendidas, salvo que sigan marcadas en exposición
    // (sirve de recordatorio para reemplazar la unidad en el salón).
    if (u.vendido && !u.exposicion) return false;

    if (filtros.pago === 'pagas'   && u.pagoEstado !== 'pagada') return false;
    if (filtros.pago === 'impagas' && u.pagoEstado !== 'impaga') return false;

    if (filtros.expo === 'indep'     && u.exposicion !== 'INDEPENDENCIA') return false;
    if (filtros.expo === 'erios'     && u.exposicion !== 'ENTRE RIOS')    return false;
    if (filtros.expo === 'expuestas' && !u.exposicion)                    return false;

    if (q) {
      const blob = (u.serie + ' ' + u.unidad + ' ' + u.color).toLowerCase();
      if (blob.indexOf(q) < 0) return false;
    }
    return true;
  });
}

function filaUnidad(u) {
  // Badge de exposición (con cartel especial si ya está vendida)
  let expoBadge;
  if (u.exposicion) {
    const cls = u.exposicion === 'ENTRE RIOS' ? 'expo-er' : 'expo-in';
    if (u.vendido) {
      expoBadge = '<span class="badge reemplazar" title="Vendida — reemplazar en ' + escapeHtml(u.exposicion) + '">'
                + '🔄 REEMPLAZAR · ' + escapeHtml(u.exposicion) + '</span>';
    } else {
      expoBadge = '<span class="badge ' + cls + '">' + escapeHtml(u.exposicion) + '</span>';
    }
  } else {
    expoBadge = '<span class="muted">—</span>';
  }

  let pagoBadge;
  if (u.pagoEstado === 'pagada') {
    pagoBadge = '<span class="badge paga" title="' + escapeHtml(u.pagoStr || 'PAGA') + '">'
              + (u.pagoFechaIso ? 'Pago ' + fmtFechaCorta(u.pagoFechaIso) : 'PAGA')
              + '</span>';
  } else if (u.pagoEstado === 'impaga') {
    pagoBadge = '<span class="badge impaga">IMPAGA</span>';
  } else {
    pagoBadge = '<span class="badge otro">' + escapeHtml(u.pagoStr) + '</span>';
  }

  // En mobile, cada td se transforma en card apilada — el data-label es lo que
  // aparece como "etiqueta" a la izquierda. Si una columna está vacía, escondemos
  // el row entero con .hidden-empty para que la card quede prolija.
  const rowCls = u.vendido && u.exposicion
    ? 'expo vendida-en-expo'
    : (u.exposicion ? 'expo' : '');

  let html = '<tr class="' + rowCls + '">';
  html += '<td data-label="Serie"><span class="serie">' + escapeHtml(u.serie) + '</span></td>';
  html += '<td class="ctr" data-label="Antig."><span title="Fact. ' + escapeHtml(u.fechaFcStr || '') + '">' + (u.antigDias !== null ? u.antigDias + ' d' : '—') + '</span></td>';
  html += '<td data-label="Unidad">' + escapeHtml(u.unidad) + '</td>';
  html += '<td data-label="Color">' + escapeHtml(u.color) + '</td>';
  html += '<td class="num col-extra" data-label="$ FC">' + fmtPesos(u.montoFc) + '</td>';
  html += '<td class="ctr col-extra" data-label="Pago">' + pagoBadge + '</td>';
  html += '<td class="num col-extra" data-label="Oferta">' + fmtPesos(u.ofertaActual) + '</td>';
  html += '<td class="num col-extra" data-label="Rdo">' + fmtPct(u.rdoActualPct) + '</td>';
  html += '<td class="num col-extra" data-label="Lista">' + fmtPesos(u.lista) + '</td>';
  html += '<td class="num col-extra" data-label="Dto">' + fmtPct(u.dtoActualPct) + '</td>';
  html += '<td class="ctr col-extra" data-label="Expo">' + expoBadge + '</td>';
  html += '</tr>';

  return html;
}

// =======================================================================
// CALCULADORA (sección aparte arriba de la tabla)
// =======================================================================
// Solo cálculo en pantalla — no toca la planilla. Dos modos sobre la unidad
// elegida en el desplegable:
//   % dto pedido: nuevo_rdo = rdo_actual − (dto_pedido − dto_actual)
//   precio pedido: nuevo_rdo = rdo_actual − ((oferta − precio_pedido) / lista) × 100

function toggleCalcSection() {
  calcOpen = !calcOpen;
  if (!calcOpen) calcSerie = '';
  renderStock();
}

function setCalcUnidad(serie) {
  calcSerie = serie || '';
  renderStock();
  if (calcSerie) {
    setTimeout(() => {
      const inp = document.getElementById('calcDtoInput');
      if (inp) inp.focus();
    }, 0);
  } else {
    // limpieza: foco al combo para que pueda elegir otra rápido
    setTimeout(() => {
      const inp = document.getElementById('calcUnidadInput');
      if (inp) inp.focus();
    }, 0);
  }
}

// Label del combo: solo el modelo (col C `unidad`). Asumimos que las unidades
// del mismo modelo comparten oferta/lista/rdo/dto, por lo que basta una entrada
// por modelo en el desplegable.
function _calcLabel(u) {
  return u.unidad;
}

// El usuario escribe o elige una opción del datalist. Cuando lo escrito
// coincide exacto con el label de una unidad, la seleccionamos. Si va
// tipiando algo parcial todavía no matchea — esperamos.
function onCalcUnidadInput(text) {
  const t = String(text || '').trim();
  if (!t) {
    // Vaciaron el input → limpio la selección
    if (calcSerie) { calcSerie = ''; renderStock(); }
    return;
  }
  const u = stockData.unidades.find(x => _calcLabel(x) === t);
  if (u && u.serie !== calcSerie) {
    calcSerie = u.serie;
    renderStock();
    setTimeout(() => {
      const inp = document.getElementById('calcDtoInput');
      if (inp) inp.focus();
    }, 0);
  }
}

function renderCalcSection() {
  // Elegibles: solo en stock (no vendidas) y con lista > 0.
  // Dedupe por modelo (col C `unidad`): si hay 10 Amarok Comfortline, una sola
  // entrada. Tomamos la primera ocurrencia — los precios deberían ser iguales
  // para todas las unidades del mismo modelo.
  const elegiblesAll = stockData.unidades.filter(u => !u.vendido && u.lista > 0);
  const seen = new Set();
  const elegibles = [];
  for (const u of elegiblesAll) {
    const k = (u.unidad || '').trim();
    if (!k || seen.has(k)) continue;
    seen.add(k);
    elegibles.push(u);
  }
  elegibles.sort((a, b) => (a.unidad || '').localeCompare(b.unidad || ''));

  const u = calcSerie ? stockData.unidades.find(x => x.serie === calcSerie) : null;

  let html = '<div class="calc-section">';
  html += '  <div class="calc-section-head">'
        + '    <button class="calc-back" onclick="toggleCalcSection()">← Volver al stock</button>'
        + '    <h3>🧮 Calculadora de precio</h3>'
        + '    <p>Elegí un modelo y probá un % de dto o un precio pedido. El cálculo es en vivo, no toca la planilla.</p>'
        + '  </div>';

  // Combo input + datalist (1 entrada por modelo). El value del input matchea
  // _calcLabel(u) = u.unidad. Cuando matchea exacto, seleccionamos.
  const currentLabel = u ? _calcLabel(u) : '';

  html += '  <div class="calc-select-row">'
        + '    <label for="calcUnidadInput">Modelo:</label>'
        + '    <input type="text" id="calcUnidadInput" class="calc-combo"'
        + '           list="calcUnidadList"'
        + '           value="' + escapeHtml(currentLabel) + '"'
        + '           oninput="onCalcUnidadInput(this.value)"'
        + '           placeholder="Escribí el modelo...">'
        + '    <datalist id="calcUnidadList">';
  for (const e of elegibles) {
    html += '      <option value="' + escapeHtml(_calcLabel(e)) + '">';
  }
  html += '    </datalist>';
  if (calcSerie) {
    html += '    <button class="calc-clear" onclick="setCalcUnidad(\'\')" title="Limpiar selección">✕</button>';
  }
  html += '  </div>';

  // Bloques (solo si hay unidad elegida)
  if (u) {
    html += '  <div class="calc-ctx-row">'
          + '    <div><span class="lab">Oferta actual</span><span class="val">' + fmtPesos(u.ofertaActual) + '</span></div>'
          + '    <div><span class="lab">Rdo actual</span><span class="val">' + fmtPct(u.rdoActualPct) + '</span></div>'
          + '    <div><span class="lab">Lista</span><span class="val">' + fmtPesos(u.lista) + '</span></div>'
          + '    <div><span class="lab">Dto actual</span><span class="val">' + fmtPct(u.dtoActualPct) + '</span></div>'
          + '  </div>';

    html += '  <div class="calc-box">';
    html += '    <div class="calc-block">'
          + '      <div class="ttl">Por % de descuento pedido</div>'
          + '      <div class="calc-input-row">'
          + '        <label>% dto pedido:</label>'
          + '        <input class="ipt" type="number" step="0.1" id="calcDtoInput" oninput="recalcDto()" placeholder="' + fmtNumLite(u.dtoActualPct) + '" />'
          + '      </div>'
          + '      <div class="calc-result neutral" id="calcDtoResult">'
          + '        <span class="lab">Rdo con dto pedido</span>'
          + '        <span><span class="val">—</span><span class="delta"></span></span>'
          + '      </div>'
          + '    </div>';
    html += '    <div class="calc-block">'
          + '      <div class="ttl">Por precio pedido ($)</div>'
          + '      <div class="calc-input-row">'
          + '        <label>$ precio pedido:</label>'
          + '        <input class="ipt" type="number" step="1000" id="calcPrecioInput" oninput="recalcPrecio()" placeholder="' + Math.round(u.ofertaActual) + '" />'
          + '      </div>'
          + '      <div class="calc-result neutral" id="calcPrecioResult">'
          + '        <span class="lab">Rdo con precio pedido</span>'
          + '        <span><span class="val">—</span><span class="delta"></span></span>'
          + '      </div>'
          + '    </div>';
    html += '  </div>';
  }

  html += '</div>';
  return html;
}

function recalcDto() {
  const u = stockData.unidades.find(x => x.serie === calcSerie);
  if (!u) return;
  const inp = document.getElementById('calcDtoInput');
  const out = document.getElementById('calcDtoResult');
  if (!inp || !out) return;

  const v = parseFloat(inp.value);
  if (isNaN(v) || inp.value === '') {
    out.className = 'calc-result neutral';
    out.querySelector('.val').textContent = '—';
    out.querySelector('.delta').textContent = '';
    return;
  }
  const nuevoRdo = u.rdoActualPct - (v - u.dtoActualPct);
  const delta = nuevoRdo - u.rdoActualPct;
  out.className = 'calc-result ' + (nuevoRdo < 0 ? 'bad' : nuevoRdo < u.rdoActualPct ? 'neutral' : 'good');
  out.querySelector('.val').textContent = fmtPct(nuevoRdo);
  out.querySelector('.delta').textContent = (delta >= 0 ? '+' : '') + fmtPct(delta, 2);
}

function recalcPrecio() {
  const u = stockData.unidades.find(x => x.serie === calcSerie);
  if (!u) return;
  const inp = document.getElementById('calcPrecioInput');
  const out = document.getElementById('calcPrecioResult');
  if (!inp || !out) return;

  const v = parseFloat(inp.value);
  if (isNaN(v) || inp.value === '' || u.lista <= 0) {
    out.className = 'calc-result neutral';
    out.querySelector('.val').textContent = '—';
    out.querySelector('.delta').textContent = '';
    return;
  }
  const drop = ((u.ofertaActual - v) / u.lista) * 100;
  const nuevoRdo = u.rdoActualPct - drop;
  const delta = nuevoRdo - u.rdoActualPct;
  out.className = 'calc-result ' + (nuevoRdo < 0 ? 'bad' : nuevoRdo < u.rdoActualPct ? 'neutral' : 'good');
  out.querySelector('.val').textContent = fmtPct(nuevoRdo);
  out.querySelector('.delta').textContent = (delta >= 0 ? '+' : '') + fmtPct(delta, 2);
}

// =======================================================================
// VENTAS · fetch
// =======================================================================
async function loadVentas(forzar) {
  if (ventasData && !forzar) { renderVentas(); return; }

  // Primer pintado: restaurar de localStorage y refrescar en bg.
  if (!ventasData && !forzar) {
    const cached = lsCacheGet('ventas');
    if (cached) {
      ventasData = cached;
      if (!mesSeleccionado || !cached.meses.find(m => m.mesKey === mesSeleccionado)) {
        const conMesActual = cached.meses.find(m => m.mesKey === cached.mesActual);
        mesSeleccionado = conMesActual ? cached.mesActual : (cached.meses[0] ? cached.meses[0].mesKey : '');
      }
      renderVentas();
      const upd = document.getElementById('updatedAtVentas');
      if (upd && cached.updatedAt) upd.textContent = 'Actualizado: ' + new Date(cached.updatedAt).toLocaleString('es-AR');
      _fetchVentasSilent();
      return;
    }
  }

  const btn  = document.getElementById('btnRefreshVentas');
  const wrap = document.getElementById('ventasContent');
  if (btn) { btn.disabled = true; btn.textContent = 'Cargando...'; }
  wrap.innerHTML = '<div class="loading"><div class="spinner"></div><div>Cargando ventas...</div></div>';

function renderVentas() {
  renderResumen();
  const wrap = document.getElementById('ventasContent');
  if (!ventasData || !Array.isArray(ventasData.ventas)) {
    wrap.innerHTML = '<div class="empty">Sin datos.</div>';
    return;
  }

  const todas = ventasData.ventas;
  const meses = ventasData.meses || [];
  const delMes = todas.filter(v => v.mesKey === mesSeleccionado);

  // KPIs del mes
  const cantidad   = delMes.length;
  const gciaPctAvg = delMes.length
    ? delMes.reduce((a, v) => a + (v.gciaVtaPct || 0), 0) / delMes.length
    : 0;
  // Gcia neta acumulada: tomamos la última fila del mes (la planilla ya
  // calcula el acumulado del mes en col Z, fila a fila).
  const ultima = delMes[delMes.length - 1];
  const acumMes = ultima ? ultima.gciaNetaAcum : 0;

  let html = '';

  // ----- Selector de mes + toggle vista resumida -----
  html += '<div class="mes-row">';
  html += '  <label for="mesSel">Mes:</label>';
  html += '  <select id="mesSel" onchange="setMesVentas(this.value)">';
  if (!meses.length) {
    html += '    <option value="">— Sin meses con ventas —</option>';
  } else {
    for (const m of meses) {
      const sel = m.mesKey === mesSeleccionado ? ' selected' : '';
      html += '    <option value="' + m.mesKey + '"' + sel + '>' + escapeHtml(m.label) + ' · ' + m.cuenta + '</option>';
    }
  }
  html += '  </select>';
  html += '  <button class="rank-toggle ' + (rankingOpen ? 'open' : '') + '" onclick="toggleRanking()">🏆 ' + (rankingOpen ? 'Ocultar ranking' : 'Ranking de vendedores') + '</button>';
  html += '  <label class="toggle-resumida">'
        + '    <input type="checkbox" ' + (vistaResumidaVentas ? 'checked' : '') + ' onchange="toggleVistaResumidaVentas()"> Vista resumida'
        + '  </label>';
  html += '</div>';

  // ----- KPIs -----
  html += '<div class="cards">';
  html += kpi('Ventas en el mes', cantidad, '', cantidad ? 'good' : '');
  html += kpi('Gcia. neta acumulada', fmtPesos(acumMes), 'al cierre del mes', acumMes > 0 ? 'good' : (acumMes < 0 ? 'bad' : ''));
  html += kpi('Gcia. % promedio', fmtPct(gciaPctAvg), '', '');
  html += '</div>';

  // ----- Ranking de vendedores del mes (solo si está abierto) -----
  if (rankingOpen) {
    html += renderRankingVendedores(delMes, mesSeleccionado);
  }

  // ----- Tabla -----
  html += '<div class="table-wrap">'
        + '  <div class="table-head">'
        + '    <h3>' + (meses.find(m => m.mesKey === mesSeleccionado)?.label || 'Sin mes seleccionado') + '</h3>'
        + '    <div class="count">' + cantidad + ' ' + (cantidad === 1 ? 'venta' : 'ventas') + '</div>'
        + '  </div>'
        + '  <div class="table-scroll">'
        + '    <table class="ventas-tbl responsive-cards ' + (vistaResumidaVentas ? 'resumida' : '') + '">'
        + '      <thead><tr>'
        + '        <th class="ctr">#</th>'
        + '        <th>Fecha PV</th>'
        + '        <th># PV</th>'
        + '        <th class="num">Monto FC</th>'
        + '        <th class="num col-extra">IVA</th>'
        + '        <th class="num col-extra">Acc</th>'
        + '        <th class="num col-extra">Costo hist.</th>'
        + '        <th class="col-extra">Serie</th>'
        + '        <th>Modelo</th>'
        + '        <th class="col-extra">Color</th>'
        + '        <th class="num">Gcia $</th>'
        + '        <th class="num">Gcia %</th>'
        + '      </tr></thead>'
        + '      <tbody>';

  if (!delMes.length) {
    html += '<tr><td colspan="12" class="empty">No hay ventas registradas en ' + escapeHtml(meses.find(m => m.mesKey === mesSeleccionado)?.label || 'este mes') + '.</td></tr>';
  } else {
    for (const v of delMes) html += filaVenta(v);
  }

  html += '      </tbody>'
        + '    </table>'
        + '  </div>'
        + '</div>';

  wrap.innerHTML = html;
}

// Vendedores oficiales. `desde` (opcional, formato 'yyyy-mm') = mes desde el
// cual el vendedor está activo; meses anteriores NO lo cuentan ni lo muestran
// en el ranking (útil para incorporaciones nuevas).
const VENDEDORES_OFICIALES = [
  { nombre: 'Jorge Fazzini' },
  { nombre: 'Jose Castro' },
  { nombre: 'Marta Castro' },
  { nombre: 'Antonio Loisi' },
  { nombre: 'Ines Alonso' },
  { nombre: 'Gisela Buena' },
  { nombre: 'Tomas Bandiera', desde: '2026-05' },   // entró en mayo
  { nombre: 'Julian Naddeo' },
  { nombre: 'TG' },
];

function renderRankingVendedores(delMes, mesKey) {
  // Filtro los oficiales activos para este mes
  const activos = VENDEDORES_OFICIALES.filter(v => !v.desde || v.desde <= mesKey);

  // Inicializo en 0
  const conteo = {};
  for (const v of activos) conteo[v.nombre] = { cantidad: 0, gcia: 0 };

  // No reconocidos: agrupados por nombre crudo
  const otros = {};

  for (const v of delMes) {
    if (v.vendedor && conteo[v.vendedor]) {
      conteo[v.vendedor].cantidad++;
      conteo[v.vendedor].gcia += v.gciaVtaPesos || 0;
    } else if (v.vendedorRaw) {
      const k = v.vendedorRaw;
      if (!otros[k]) otros[k] = { cantidad: 0, gcia: 0 };
      otros[k].cantidad++;
      otros[k].gcia += v.gciaVtaPesos || 0;
    }
  }

  // Ordeno: cantidad desc, después gcia desc, después nombre
  const ranking = activos.map(v => ({ nombre: v.nombre, ...conteo[v.nombre] }))
    .sort((a, b) =>
      b.cantidad - a.cantidad
      || b.gcia - a.gcia
      || a.nombre.localeCompare(b.nombre)
    );

  let html = '<div class="ranking-wrap">';
  html += '  <div class="ranking-head"><h3>🏆 Ranking de vendedores</h3>';
  html += '    <div class="muted">' + delMes.length + ' ' + (delMes.length === 1 ? 'venta' : 'ventas') + ' del mes</div>';
  html += '  </div>';
  html += '  <table class="ranking-tbl">';
  html += '    <thead><tr>'
        + '      <th class="ctr">#</th><th>Vendedor</th>'
        + '      <th class="num">Ventas</th><th class="num">Gcia $</th>'
        + '    </tr></thead><tbody>';
  let pos = 0;
  for (const r of ranking) {
    pos++;
    const cls = r.cantidad === 0 ? 'zero' : (pos === 1 && r.cantidad > 0 ? 'top' : '');
    html += '<tr class="' + cls + '">';
    html += '  <td class="ctr pos">' + pos + '</td>';
    html += '  <td class="vname">' + escapeHtml(r.nombre) + '</td>';
    html += '  <td class="num">' + r.cantidad + '</td>';
    html += '  <td class="num">' + (r.cantidad ? fmtPesos(r.gcia) : '—') + '</td>';
    html += '</tr>';
  }
  html += '    </tbody></table>';

  // Otros (no reconocidos)
  const otrosKeys = Object.keys(otros);
  if (otrosKeys.length) {
    html += '<div class="ranking-otros">'
          + '  <div class="hd">⚠️ Nombres no reconocidos (' + otrosKeys.length + ')</div>'
          + '  <div class="dd">Estos nombres están en la planilla pero no matchean ninguno de los 9 oficiales. Avisame para agregarlos o ajustar la regla de mapeo.</div>'
          + '  <ul>';
    for (const k of otrosKeys.sort((a, b) => otros[b].cantidad - otros[a].cantidad)) {
      const o = otros[k];
      html += '<li><b>' + escapeHtml(k) + '</b> — ' + o.cantidad + ' ' + (o.cantidad === 1 ? 'venta' : 'ventas') + ' · ' + fmtPesos(o.gcia) + '</li>';
    }
    html += '  </ul>';
    html += '</div>';
  }

  html += '</div>';
  return html;
}

function filaVenta(v) {
  let html = '<tr>';
  html += '<td class="ctr" data-label="#">' + (v.ventaNum || '—') + '</td>';
  html += '<td data-label="Fecha PV">' + escapeHtml(v.fechaPvStr || fmtFechaCorta(v.fechaPvIso)) + '</td>';

  html += '<td class="num col-extra" data-label="Acc">' + (v.acc ? fmtPesos(v.acc) : (v.accStr || '—')) + '</td>';
  html += '<td class="num col-extra" data-label="Costo hist.">' + fmtPesos(v.costoHist) + '</td>';
  html += '<td class="col-extra" data-label="Serie"><span class="serie">' + escapeHtml(v.serie) + '</span></td>';

  html += '<td class="num gcia-pos" data-label="Gcia %">' + fmtPct(v.gciaVtaPct) + '</td>';
  html += '</tr>';
  return html;
}

function _urlIncentivos(mesKey, fresh) {

  // Asegurar que ventas/patentamientos/stock estén cargados (para el matching

  if (!patentData) loadPatentamientos(false);
  if (!stockData)  loadStock(false);

// =======================================================================
// INCENTIVOS · render
// =======================================================================
function renderIncentivos() {
  const wrap = document.getElementById('incentivosContent');
  if (!wrap) return;
  if (!incentivosData) {
    wrap.innerHTML = '<div class="empty">Sin datos.</div>';
    return;
  }
  if (incentivosData.error) {
    wrap.innerHTML = '<div class="errbox"><div class="ttl">⚠️ ' + escapeHtml(incentivosData.error) + '</div>'
      + '<div>Verificá que la hoja exista en la planilla espejo (con IMPORTRANGE de la madre).</div></div>';
    return;
  }

  const patUnits = incentivosData.porUnidadPatentada || [];
  const compUnits = incentivosData.porUnidadComprada || [];

  // Aplicar regla 100%: cc90Ajustado = al100 ? cc90Base / 0.9 : cc90Base
  const ajuste = (u) => al100Inc ? (u.cc90Base / 0.9) : u.cc90Base;

  const totales = {
    cc90:       patUnits.reduce((a, u) => a + ajuste(u), 0),
    tactico:    patUnits.reduce((a, u) => a + (u.tactico || 0), 0),
    adicional1: patUnits.reduce((a, u) => a + (u.adicional1 || 0), 0),
    adicional2: patUnits.reduce((a, u) => a + (u.adicional2 || 0), 0),
    whosale:    compUnits.reduce((a, u) => a + (u.whosale || 0), 0),
  };
  totales.totalPat   = totales.cc90 + totales.tactico + totales.adicional1 + totales.adicional2;
  totales.totalGeneral = totales.totalPat + totales.whosale;

  let html = '';

  // ----- Toolbar: selector de mes + toggles -----
  html += '<div class="mes-row">';
  html += '  <label for="mesSelInc">Mes:</label>';
  // Reusamos meses de patentamientos si hay (mismo universo)
  const mesesDisp = (patentData && patentData.meses) || [{ mesKey: incentivosData.mesKey, label: incentivosData.mesKey }];
  html += '  <select id="mesSelInc" onchange="setMesInc(this.value)">';
  for (const m of mesesDisp) {
    const sel = m.mesKey === incentivosData.mesKey ? ' selected' : '';
    html += '    <option value="' + m.mesKey + '"' + sel + '>' + escapeHtml(m.label) + '</option>';
  }
  html += '  </select>';
  html += '  <label class="toggle-resumida">'
        + '    <input type="checkbox" ' + (al100Inc ? 'checked' : '') + ' onchange="toggleAl100Inc()"> Cobranza al 100% (CC 90 / 0.9)'
        + '  </label>';
  html += '  <label class="toggle-resumida">'
        + '    <input type="checkbox" ' + (vistaResumidaInc ? 'checked' : '') + ' onchange="toggleVistaResumidaInc()"> Vista resumida'
        + '  </label>';
  html += '  <span style="margin-left:auto;font-size:11px;color:var(--vw-grey-3)">Hoja BT: <b>' + escapeHtml(incentivosData.btHojaUsada || '—') + '</b></span>';
  html += '</div>';

  // ----- KPIs totales -----
  html += '<div class="cards">';
  html += kpi('Total a cobrar', fmtPesos(totales.totalGeneral), patUnits.length + ' patentadas · ' + compUnits.length + ' compradas', totales.totalGeneral > 0 ? 'good' : '');
  html += kpi('CC 90' + (al100Inc ? ' (100%)' : ''), fmtPesos(totales.cc90), '', '');
