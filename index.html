function onPickPagosVW(e) {
  const files = Array.from(e.target.files || []);
  if (files.length) procesarPDFsPagos(files);
  e.target.value = '';  // permitir re-elegir los mismos
}

function onDropPagosVW(e) {
  e.preventDefault();
  document.getElementById('uploadZoneInc')?.classList.remove('over');
  const files = Array.from(e.dataTransfer.files || []).filter(f => /\.pdf$/i.test(f.name));
  if (files.length) procesarPDFsPagos(files);
}

async function procesarPDFsPagos(files) {
  if (typeof pdfjsLib === 'undefined') {
    alert('pdf.js no cargó todavía, refrescá la página y reintentá.');
    return;
  }
  parseStatus = 'Parseando ' + files.length + ' PDFs...';
  renderIncentivos();

  const nuevos = [];
  for (let i = 0; i < files.length; i++) {
    parseStatus = 'Parseando ' + (i + 1) + ' de ' + files.length + '...';
    renderIncentivos();
    try {
      const texto = await _leerPDFTexto(files[i]);
      const parsed = _parsearNC(texto);
      if (parsed) nuevos.push(parsed);
    } catch (err) {
      console.warn('Error parseando', files[i].name, err);
    }
  }

  // Pre-cargar BT data para los meses únicos detectados (cache)
  const meses = Array.from(new Set(nuevos.map(p => p.mesIncentivo).filter(Boolean)));
  await Promise.all(meses.map(m => _ensureIncentivosData(m)));

  // Matching: serie → modelo → CCs → tipoDetectado
  for (const p of nuevos) {
    const m = _matchearPago(p);
    Object.assign(p, m);
  }

  // Filtrar duplicados contra lo ya parseado en sesión
  const existentes = new Set(pagosParseados.map(p => p.ncNum));
  const sinDup = nuevos.filter(p => !existentes.has(p.ncNum));

  pagosParseados = pagosParseados.concat(sinDup);
  parseStatus = sinDup.length + ' NCs nuevas parseadas (' + (nuevos.length - sinDup.length) + ' duplicadas en sesión).';
  renderIncentivos();
}

async function _leerPDFTexto(file) {
  const buf = await file.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({ data: buf }).promise;
  let texto = '';
  for (let p = 1; p <= pdf.numPages; p++) {
    const page = await pdf.getPage(p);
    const content = await page.getTextContent();
    texto += content.items.map(it => it.str).join('\n') + '\n';
  }
  return texto;
}

// Parsea el texto de un NC y devuelve los campos. Si no encuentra los mínimos
// (NC + monto + serie), devuelve null para que se ignore.
function _parsearNC(texto) {
  const o = {};

  const mNc = texto.match(/N[°O]\s*([\d-]+)/);
  if (mNc) o.ncNum = mNc[1].trim();

  const mFecha = texto.match(/FECHA:\s*(\d{2}\/\d{2}\/\d{4})/);
  if (mFecha) o.fechaNc = mFecha[1];

  const mNeto = texto.match(/Neto\s*Gravado\s*([\d.,]+)/i);
  if (mNeto) o.montoNeto = _parseNum(mNeto[1]);

  // El TOTAL final aparece varias veces (header + final), tomamos el último.
  const totalRx = /TOTAL\s+([\d.,]+\.\d{2})/g;
  let lastTotal = null, mm;
  while ((mm = totalRx.exec(texto)) !== null) lastTotal = mm[1];
  if (lastTotal) o.montoTotal = _parseNum(lastTotal);

  const mVin = texto.match(/UNIDAD:\s*([A-Z0-9]{17})/);
  if (mVin) {
    o.vin = mVin[1];
    o.serie = mVin[1].slice(-8);  // últimos 8 chars
  }

  // Texto libre con tipo + mes: aparece entre "FACTURA: ..." y "Documentos asociados"
  // o entre "FACTURA: ..." y "CAE N°"
  const mTexto = texto.match(/FACTURA:\s*A\s+\d+\s+\d+\s+\d{2}\/\d{2}\/\d{2}\s*\n+\s*([^\n]+)/);
  if (mTexto) o.textoTipo = mTexto[1].trim();

  // Mes incentivo: "Marzo 2026" → "2026-03"
  const meses = {enero:'01',febrero:'02',marzo:'03',abril:'04',mayo:'05',junio:'06',julio:'07',agosto:'08',septiembre:'09',octubre:'10',noviembre:'11',diciembre:'12'};
  const mMes = (o.textoTipo || texto).match(/(Enero|Febrero|Marzo|Abril|Mayo|Junio|Julio|Agosto|Septiembre|Octubre|Noviembre|Diciembre)\s+(\d{4})/i);
  if (mMes) o.mesIncentivo = mMes[2] + '-' + meses[mMes[1].toLowerCase()];

  if (!o.ncNum || !o.montoNeto || !o.serie) return null;
  return o;
}

// Parser robusto que detecta US (1,121,839.00) vs AR (1.121.839,00) por la
// posición relativa de . y ,. Los PDFs de VW vienen en formato US.
function _parseNum(s) {
  if (!s) return 0;
  const str = String(s).trim();
  if (!str) return 0;
  const lastComma = str.lastIndexOf(',');
  const lastDot   = str.lastIndexOf('.');
  let n;
  if (lastComma > -1 && lastDot > -1) {
    if (lastDot > lastComma) n = parseFloat(str.replace(/,/g, ''));         // US
    else                     n = parseFloat(str.replace(/\./g, '').replace(',', '.')); // AR
  } else if (lastComma > -1) {
    n = parseFloat(str.replace(',', '.'));
  } else {
    n = parseFloat(str);
  }
  return isNaN(n) ? 0 : n;
}

function _normModeloKey(s) {
  return String(s || '').trim().toUpperCase()
    .replace(/[ÁÄÀÂ]/g,'A').replace(/[ÉËÈÊ]/g,'E').replace(/[ÍÏÌÎ]/g,'I')
    .replace(/[ÓÖÒÔ]/g,'O').replace(/[ÚÜÙÛ]/g,'U')
    .replace(/\s+/g, ' ');
}

// Pre-carga BT data para un mes específico (cache local + server cache 90s).
async function _ensureIncentivosData(mes) {
  if (incentivosDataByMes[mes]) return incentivosDataByMes[mes];
  try {
    const url = APPS_SCRIPT_URL + '?token=' + encodeURIComponent(APPS_SCRIPT_TOKEN) + '&tipo=incentivos&mes=' + encodeURIComponent(mes);
    const res = await fetch(url);
    if (!res.ok) return null;
    const data = await res.json();
    if (data && !data.error) incentivosDataByMes[mes] = data;
    return data;
  } catch { return null; }
}

// Busca modelo por serie. Prioridad:
//   1. patentamientos.serie → busca su PV → modelo canónico en ventas
//   2. ventas.serie directamente (col H)
//   3. patentamientos.serie → modelo en patent (puede tener typos)
//   4. stock.serie → unidad
function _findModeloPorSerie(serie) {
  const s = String(serie || '').trim();
  if (!s) return null;

  // 1+3) Buscar carpeta por serie en patentamientos
  let pvDePatent = null;
  let modeloDePatent = null;
  if (patentData && Array.isArray(patentData.carpetas)) {
    const c = patentData.carpetas.find(x => x.serie === s);
    if (c) {
      pvDePatent     = c.pv ? String(c.pv).trim() : null;
      modeloDePatent = c.modelo || null;
    }
  }
  // 1) Si tenemos PV, buscamos modelo canónico en ventas
  if (pvDePatent && ventasData && Array.isArray(ventasData.ventas)) {
    const v = ventasData.ventas.find(x => String(x.preventaNum).trim() === pvDePatent);
    if (v && v.modelo) return v.modelo;
  }
  // 2) Match directo en ventas por serie
  if (ventasData && Array.isArray(ventasData.ventas)) {
    const v = ventasData.ventas.find(x => x.serie === s);
    if (v && v.modelo) return v.modelo;
  }
  // 3) Fallback: modelo de patentamientos (puede tener typos)
  if (modeloDePatent) return modeloDePatent;
  // 4) Stock
  if (stockData && Array.isArray(stockData.unidades)) {
    const u = stockData.unidades.find(x => x.serie === s);
    if (u) return u.unidad || u.modelo || null;
  }
  return null;
}

// Dado un pago parseado, busca el modelo y la CC más probable comparando
// montoNeto contra las CCs esperadas del modelo en la BT del mes_incentivo.
function _matchearPago(p) {
  const out = { tipoDetectado: 'desconocido', modelo: null, matchWarn: null };
  out.modelo = _findModeloPorSerie(p.serie);
  if (!out.modelo) { out.matchWarn = 'serie no está en stock/patent'; return out; }

  const data = incentivosDataByMes[p.mesIncentivo];
  if (!data || !data.modelosBT) { out.matchWarn = 'sin BT para ' + p.mesIncentivo; return out; }
  const cc = data.modelosBT[_normModeloKey(out.modelo)];
  if (!cc) { out.matchWarn = 'modelo no está en la BT del mes'; return out; }

  // Targets a comparar con el montoNeto del PDF
  const targets = {
    cc90:        cc.cc90,
    cc90_100:    cc.cc90 / 0.9,  // versión al 100%
    tactico:     cc.tactico,
    whosale:     cc.whosale,
    adicional1:  cc.adicional1,
    adicional2:  cc.adicional2,
  };
  let best = null, bestPctDiff = 1;
  for (const k in targets) {
    const t = targets[k];
    if (!t || t === 0) continue;
    const pctDiff = Math.abs(t - p.montoNeto) / t;
    if (pctDiff < 0.01 && pctDiff < bestPctDiff) {
      best = k; bestPctDiff = pctDiff;
    }
  }
  if (best) {
    out.tipoDetectado = best.startsWith('cc90') ? 'cc90' : best;
    if (best === 'cc90_100') out.matchWarn = 'matcheó al 100% (vs 90% base)';
  } else {
    // Si no matchea por monto, usar texto libre como pista
    const t = (p.textoTipo || '').toLowerCase();
    if (/wholesale|whosale/.test(t))    { out.tipoDetectado = 'whosale';    out.matchWarn = 'monto no matchea BT, asignado por texto'; }
    else if (/tactic/.test(t))          { out.tipoDetectado = 'tactico';    out.matchWarn = 'monto no matchea BT, asignado por texto'; }
    else if (/cc.?90|c90/i.test(t))     { out.tipoDetectado = 'cc90';       out.matchWarn = 'monto no matchea BT, asignado por texto'; }
    else if (/adicional/.test(t))       { out.tipoDetectado = 'adicional1'; out.matchWarn = 'monto no matchea BT, asignado por texto (genérico)'; }
    else                                { out.matchWarn = 'monto no matchea ninguna CC de la BT'; }
  }
  return out;
}

function _resumirPagosParseados(pagos) {
  const porTipo = {};
  let totalNeto = 0;
  for (const p of pagos) {
    const t = p.tipoDetectado || 'desconocido';
    porTipo[t] = (porTipo[t] || 0) + 1;
    totalNeto += p.montoNeto || 0;
  }
  return { porTipo, totalNeto };
}

async function guardarPagosVW() {
  if (!pagosParseados.length) return;
  const ok = confirm('¿Guardar ' + pagosParseados.length + ' NCs en la hoja pagos_vw? Los duplicados por N° NC se ignoran.');
  if (!ok) return;

  parseStatus = 'Guardando...';
  renderIncentivos();

  try {
    const res = await fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      body: JSON.stringify({
        token:  APPS_SCRIPT_TOKEN,
        accion: 'guardar',
        pagos:  pagosParseados,
      }),
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    parseStatus = '✅ Guardados: ' + data.guardados + ' · Duplicados ignorados: ' + data.duplicados + ' · Total acumulado en la hoja: ' + data.total;
    pagosParseados = [];
    renderIncentivos();
  } catch (e) {
    parseStatus = '⚠️ Error al guardar: ' + (e.message || e);
    renderIncentivos();
  }
}

function descartarPagosParseados() {
  if (pagosParseados.length && !confirm('¿Descartar los ' + pagosParseados.length + ' NCs sin guardar?')) return;
  pagosParseados = [];
  parseStatus = '';
  renderIncentivos();
}

// =======================================================================
function renderPatentamientos() {
  renderResumen();
  const wrap = document.getElementById('patentContent');
  if (!patentData || !Array.isArray(patentData.carpetas)) {
    wrap.innerHTML = '<div class="empty">Sin datos.</div>';
    return;
  }

  const todas  = patentData.carpetas;
  const meses  = patentData.meses || [];
  let delMes   = todas.filter(c => c.mesKey === mesSelPat);

  // Filtro por vendedor (drill-down)
  if (vendedorFiltroPat) {
    delMes = delMes.filter(c => c.vendedor === vendedorFiltroPat);
  }

  // KPIs base
  const total       = delMes.length;
  const patentadas  = delMes.filter(c => c.patentada).length;
  const pendientes  = total - patentadas;
  const objetivo    = objetivosPat[mesSelPat] || 0;
  const restanObj   = Math.max(0, objetivo - patentadas);

  // Desgloses (% por grupo)
  const porPatenta = _agruparCount(delMes, c => c.patentaA || '—');     // TG / CLIENTE / REVENTA
  const porTipo    = _agruparCount(delMes, c => c.tipoCarpetaCanon || c.tipoCarpeta || '—');
  const porRevPart = _agruparCount(delMes, c => c.reventaOParticular || '—');
  const porVend    = _agruparCount(delMes, c => c.vendedor || (c.vendedorRaw || '—'));

  // Mix admin × tipo canónico: por cada admin, cuántas carpetas de cada bucket.
  // Estructura: { admin: { total, tipos: { 'Tradicional/Contado': N, ... } } }
  const adminMix = {};
  for (const c of delMes) {
    const a = c.admin || '—';
    const t = c.tipoCarpetaCanon || c.tipoCarpeta || '—';
    if (!adminMix[a]) adminMix[a] = { total: 0, tipos: {} };
    adminMix[a].total += 1;
    adminMix[a].tipos[t] = (adminMix[a].tipos[t] || 0) + 1;
  }

  let html = '';

  // ----- Selector de mes + filtro vendedor + vista resumida -----
  html += '<div class="mes-row">';
  html += '  <label for="mesSelPat">Mes:</label>';
  html += '  <select id="mesSelPat" onchange="setMesPat(this.value)">';
  if (!meses.length) {
    html += '    <option value="">— Sin meses cargados —</option>';
  } else {
    for (const m of meses) {
      const sel = m.mesKey === mesSelPat ? ' selected' : '';
      html += '    <option value="' + m.mesKey + '"' + sel + '>' + escapeHtml(m.label) + ' · ' + m.cuenta + '</option>';
    }
  }
  html += '  </select>';

  // Filtro vendedor (drill-down)
  const vendedoresDelMes = Object.keys(_agruparCount(todas.filter(c => c.mesKey === mesSelPat), c => c.vendedor || '')).filter(Boolean);
  html += '  <select id="vendFiltroPat" onchange="setVendedorFiltroPat(this.value)" style="min-width:200px">';
  html += '    <option value="">Todos los vendedores</option>';
  for (const v of vendedoresDelMes.sort()) {
    const sel = v === vendedorFiltroPat ? ' selected' : '';
    html += '    <option value="' + escapeHtml(v) + '"' + sel + '>' + escapeHtml(v) + '</option>';
  }
  html += '  </select>';
  if (vendedorFiltroPat) {
    html += '  <button class="calc-clear" onclick="setVendedorFiltroPat(\'\')" title="Limpiar">✕</button>';
  }
  html += '  <label class="toggle-resumida">'
        + '    <input type="checkbox" ' + (vistaResumidaPat ? 'checked' : '') + ' onchange="toggleVistaResumidaPat()"> Vista resumida'
        + '  </label>';
  html += '</div>';

  if (vendedorFiltroPat) {
    html += '<div class="pat-filterinfo">'
          + '  📊 Viendo solo carpetas de <b>' + escapeHtml(vendedorFiltroPat) + '</b> en ' + escapeHtml((meses.find(m => m.mesKey === mesSelPat)?.label) || mesSelPat)
          + '</div>';
  }

  // ----- KPIs principales + objetivo editable -----
  html += '<div class="cards">';
  html += kpi('Carpetas del mes', total, '', total ? 'good' : '');
  html += kpi('Patentadas', patentadas, total ? Math.round(patentadas / total * 100) + '% del total' : '', patentadas ? 'good' : '');
  html += kpi('Pendientes', pendientes, '', pendientes ? 'warn' : '');
  html += '<div class="card editable">'
        + '  <div class="label">Objetivo del mes</div>'
        + '  <div class="value"><input type="number" min="0" step="1" value="' + objetivo + '" onchange="setObjetivoPat(this.value)" class="kpi-input" /></div>'
        + '  <div class="sub">Faltan <b>' + restanObj + '</b> para llegar</div>'
        + '</div>';
  html += '</div>';

  // ----- Barras de progreso vs objetivo -----
  if (objetivo > 0) {
    const pctPatVsObj = Math.min(100, Math.round((patentadas / objetivo) * 100));
    const pctTotVsObj = Math.min(100, Math.round((total      / objetivo) * 100));
    html += '<div class="pat-progress">';
    html += '  <div class="prow"><div class="lab">Patentadas vs objetivo</div>'
          + '    <div class="bar"><div class="fill good" style="width:' + pctPatVsObj + '%"></div></div>'
          + '    <div class="val">' + patentadas + ' / ' + objetivo + ' (' + pctPatVsObj + '%)</div>'
          + '  </div>';
    html += '  <div class="prow"><div class="lab">Carpetas cargadas vs objetivo</div>'
          + '    <div class="bar"><div class="fill neutral" style="width:' + pctTotVsObj + '%"></div></div>'
          + '    <div class="val">' + total + ' / ' + objetivo + ' (' + pctTotVsObj + '%)</div>'
          + '  </div>';
    html += '</div>';
  }

  // ----- Desgloses % -----
  html += '<div class="desgloses">';
  html += desgloseCard('Quién patenta',     porPatenta, total);
  html += desgloseCard('Reventa / Particular', porRevPart, total);
  html += desgloseCard('Tipo de carpeta',   porTipo,    total);
  html += desgloseCard('Por vendedor',      porVend,    total);
  html += '</div>';

  // ----- Mix por administrativa (admin × tipo de carpeta) -----
  html += desgloseAdminMix(adminMix);

  // ----- Tabla -----
  html += '<div class="table-wrap">'
        + '  <div class="table-head">'
        + '    <h3>Carpetas — ' + escapeHtml((meses.find(m => m.mesKey === mesSelPat)?.label) || 'Sin mes') + '</h3>'
        + '    <div class="count">' + delMes.length + ' visibles</div>'
        + '  </div>'
        + '  <div class="table-scroll">'
        + '    <table class="patent-tbl responsive-cards ' + (vistaResumidaPat ? 'resumida' : '') + '">'
        + '      <thead><tr>'
        + '        <th class="ctr">#</th>'
        + '        <th># PV</th>'
        + '        <th class="col-extra">Serie</th>'
        + '        <th class="ctr">Patenta</th>'
        + '        <th class="col-extra">Admin</th>'
        + '        <th class="col-extra">Tipo</th>'
        + '        <th class="col-extra">Rev/Part</th>'
        + '        <th>Vendedor</th>'
        + '        <th class="col-extra">Cliente</th>'
        + '        <th>Modelo</th>'
        + '        <th class="ctr">Fecha pat.</th>'
        + '        <th class="col-extra">Dominio</th>'
        + '      </tr></thead><tbody>';

  if (!delMes.length) {
    html += '<tr><td colspan="12" class="empty">No hay carpetas para este filtro.</td></tr>';
  } else {
    for (const c of delMes) html += filaPatent(c);
  }
  html += '</tbody></table></div></div>';

  wrap.innerHTML = html;
}

function filaPatent(c) {
  const patBadge = c.patentada
    ? '<span class="badge paga">' + escapeHtml(c.fechaPatStr || fmtFechaCorta(c.fechaPatIso)) + '</span>'
    : '<span class="badge impaga">Pendiente</span>';
  const patentaBadge = c.patentaA
    ? '<span class="badge ' + _patentaCls(c.patentaA) + '">' + escapeHtml(c.patentaA) + '</span>'
    : '<span class="muted">—</span>';

  let h = '<tr>';
  h += '<td class="ctr" data-label="#">' + (c.num || '—') + '</td>';
  h += '<td data-label="# PV">' + escapeHtml(c.pv) + '</td>';
  h += '<td class="col-extra" data-label="Serie"><span class="serie">' + escapeHtml(c.serie) + '</span></td>';
  h += '<td class="ctr" data-label="Patenta">' + patentaBadge + '</td>';
  h += '<td class="col-extra" data-label="Admin">' + escapeHtml(c.admin || '—') + '</td>';
  h += '<td class="col-extra" data-label="Tipo">' + escapeHtml(c.tipoCarpetaCanon || c.tipoCarpeta || '—') + '</td>';
  h += '<td class="col-extra" data-label="Rev/Part">' + escapeHtml(c.reventaOParticular || '—') + '</td>';
  h += '<td data-label="Vendedor">' + escapeHtml(c.vendedor || c.vendedorRaw || '—') + '</td>';
  h += '<td class="col-extra" data-label="Cliente">' + escapeHtml(c.cliente || '—') + '</td>';
  h += '<td data-label="Modelo">' + escapeHtml(c.modelo || '—') + '</td>';
  h += '<td class="ctr" data-label="Fecha pat.">' + patBadge + '</td>';
  h += '<td class="col-extra" data-label="Dominio">' + escapeHtml(c.dominio || '—') + '</td>';
  h += '</tr>';
  return h;
}

function _patentaCls(p) {
  if (p === 'TG')      return 'expo-er';
  if (p === 'CLIENTE') return 'stock';
  if (p === 'REVENTA') return 'expo-in';
  return 'otro';
}

function _agruparCount(arr, keyFn) {
  const o = {};
  for (const x of arr) {
    const k = keyFn(x);
    if (!k && k !== 0) continue;
    o[k] = (o[k] || 0) + 1;
  }
  return o;
}

// Sección "Carpetas por administrativa" — una card por admin con el mix de
// tipos de carpeta. Reutiliza el mismo HTML/CSS de las desgloses (.desg / .dr).
function desgloseAdminMix(adminMix) {
  const admins = Object.keys(adminMix);
  if (!admins.length) return '';
  // Orden: por total descendente, luego alfabético.
  admins.sort((a, b) => adminMix[b].total - adminMix[a].total || a.localeCompare(b));

  let h = '<h4 class="desg-title">Carpetas por administrativa</h4>';
  h += '<div class="desgloses">';
  for (const a of admins) {
    const { total: tot, tipos } = adminMix[a];
    const items = Object.keys(tipos).map(k => ({ k: k, n: tipos[k] }))
      .sort((x, y) => y.n - x.n);
    h += '<div class="desg">';
    h += '  <div class="hd">' + escapeHtml(a) + ' · <span class="hd-sub">' + tot + ' carp.</span></div>';
    for (const it of items) {
      const pct = tot ? Math.round(it.n / tot * 100) : 0;
      h += '<div class="dr">'
         + '  <div class="dr-k">' + escapeHtml(it.k) + '</div>'
         + '  <div class="dr-bar"><div class="dr-fill" style="width:' + pct + '%"></div></div>'
         + '  <div class="dr-v">' + it.n + ' · ' + pct + '%</div>'
         + '</div>';
    }
    h += '</div>';
  }
  h += '</div>';
  return h;
}

// Card con bars horizontales: cada key con su cantidad y %
function desgloseCard(titulo, mapCount, total) {
  const items = Object.keys(mapCount).map(k => ({ k: k, n: mapCount[k] }));
  if (!items.length) {
    return '<div class="desg"><div class="hd">' + escapeHtml(titulo) + '</div><div class="empty-mini">—</div></div>';
  }
  items.sort((a, b) => b.n - a.n);
  let h = '<div class="desg"><div class="hd">' + escapeHtml(titulo) + '</div>';
  for (const it of items) {
    const pct = total ? Math.round(it.n / total * 100) : 0;
    h += '<div class="dr">'
       + '  <div class="dr-k">' + escapeHtml(String(it.k)) + '</div>'
       + '  <div class="dr-bar"><div class="dr-fill" style="width:' + pct + '%"></div></div>'
       + '  <div class="dr-v">' + it.n + ' · ' + pct + '%</div>'
       + '</div>';
  }
  h += '</div>';
  return h;
}

// =======================================================================
// FORMAT / UTILS
// =======================================================================
function fmtPesos(n) {
  if (n == null || n === '' || isNaN(n)) return '—';
  if (!n) return '—';
  return '$ ' + Math.round(n).toLocaleString('es-AR');
}
function fmtPct(n, dec) {
  if (n == null || isNaN(n)) return '—';
  return (Math.round(n * 100) / 100).toLocaleString('es-AR', {
    minimumFractionDigits: dec || 1,
    maximumFractionDigits: dec || 2,
  }) + ' %';
}
function fmtNumLite(n) {
  if (n == null || isNaN(n)) return '';
  return (Math.round(n * 10) / 10).toString();
}
function fmtFechaCorta(iso) {
  if (!iso) return '';
  const m = iso.match(/^(\d{4})-(\d{2})-(\d{2})/);
  if (!m) return iso;
  return m[3] + '/' + m[2];
}
function escapeHtml(s) {
  return String(s == null ? '' : s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

// =======================================================================
// INIT
// =======================================================================
(function init() {
  const session = getSharedCookie();
  if (!session || !session.usuario) {
    showGate('Necesitás iniciar sesión en el portal.');
    return;
  }
  if (session._impersonatedBy) {
    showGate('Esta vista no permite sesiones impersonadas.');
    return;
  }
  if (!USUARIOS_PERMITIDOS.includes(session.usuario)) {
    showGate('Tu usuario no tiene acceso a esta vista.');
    return;
  }
  enterApp(session);
})();
</script>
