function renderVentas() {
  const wrap = document.getElementById('ventasContent');
  if (!ventasData || !Array.isArray(ventasData.ventas)) {
    wrap.innerHTML = '<div class="empty">Sin datos.</div>';
    return;
  }

  const todas = ventasData.ventas;
  const meses = ventasData.meses || [];
  const delMes = todas.filter(v => v.mesKey === mesSeleccionado);

  // KPIs del mes
  const cantidad   = delMes.length;
  const gciaPctAvg = delMes.length
    ? delMes.reduce((a, v) => a + (v.gciaVtaPct || 0), 0) / delMes.length
    : 0;
  // Gcia neta acumulada: tomamos la última fila del mes (la planilla ya
  // calcula el acumulado del mes en col Z, fila a fila).
  const ultima = delMes[delMes.length - 1];
  const acumMes = ultima ? ultima.gciaNetaAcum : 0;

  let html = '';

  // ----- Selector de mes + toggle vista resumida -----
  html += '<div class="mes-row">';
  html += '  <label for="mesSel">Mes:</label>';
  html += '  <select id="mesSel" onchange="setMesVentas(this.value)">';
  if (!meses.length) {
    html += '    <option value="">— Sin meses con ventas —</option>';
  } else {
    for (const m of meses) {
      const sel = m.mesKey === mesSeleccionado ? ' selected' : '';
      html += '    <option value="' + m.mesKey + '"' + sel + '>' + escapeHtml(m.label) + ' · ' + m.cuenta + '</option>';
    }
  }
  html += '  </select>';
  html += '  <button class="rank-toggle ' + (rankingOpen ? 'open' : '') + '" onclick="toggleRanking()">🏆 ' + (rankingOpen ? 'Ocultar ranking' : 'Ranking de vendedores') + '</button>';
  html += '  <label class="toggle-resumida">'
        + '    <input type="checkbox" ' + (vistaResumidaVentas ? 'checked' : '') + ' onchange="toggleVistaResumidaVentas()"> Vista resumida'
        + '  </label>';
  html += '</div>';

  // ----- KPIs -----
  html += '<div class="cards">';
  html += kpi('Ventas en el mes', cantidad, '', cantidad ? 'good' : '');
  html += kpi('Gcia. neta acumulada', fmtPesos(acumMes), 'al cierre del mes', acumMes > 0 ? 'good' : (acumMes < 0 ? 'bad' : ''));
  html += kpi('Gcia. % promedio', fmtPct(gciaPctAvg), '', '');
  html += '</div>';

  // ----- Ranking de vendedores del mes (solo si está abierto) -----
  if (rankingOpen) {
    html += renderRankingVendedores(delMes, mesSeleccionado);
  }

  // ----- Tabla -----
  html += '<div class="table-wrap">'
        + '  <div class="table-head">'
        + '    <h3>' + (meses.find(m => m.mesKey === mesSeleccionado)?.label || 'Sin mes seleccionado') + '</h3>'
        + '    <div class="count">' + cantidad + ' ' + (cantidad === 1 ? 'venta' : 'ventas') + '</div>'
        + '  </div>'
        + '  <div class="table-scroll">'
        + '    <table class="ventas-tbl responsive-cards ' + (vistaResumidaVentas ? 'resumida' : '') + '">'
        + '      <thead><tr>'
        + '        <th class="ctr">#</th>'
        + '        <th>Fecha PV</th>'
        + '        <th># PV</th>'
        + '        <th class="num">Monto FC</th>'
        + '        <th class="num col-extra">IVA</th>'
        + '        <th class="num col-extra">Acc</th>'
        + '        <th class="num col-extra">Costo hist.</th>'
        + '        <th class="col-extra">Serie</th>'
        + '        <th>Modelo</th>'
        + '        <th class="col-extra">Color</th>'
        + '        <th class="num">Gcia $</th>'
        + '        <th class="num">Gcia %</th>'
        + '      </tr></thead>'
        + '      <tbody>';

  if (!delMes.length) {
    html += '<tr><td colspan="12" class="empty">No hay ventas registradas en ' + escapeHtml(meses.find(m => m.mesKey === mesSeleccionado)?.label || 'este mes') + '.</td></tr>';
  } else {
    for (const v of delMes) html += filaVenta(v);
  }

  html += '      </tbody>'
        + '    </table>'
        + '  </div>'
        + '</div>';

  wrap.innerHTML = html;
}

// Vendedores oficiales. `desde` (opcional, formato 'yyyy-mm') = mes desde el
// cual el vendedor está activo; meses anteriores NO lo cuentan ni lo muestran
// en el ranking (útil para incorporaciones nuevas).
const VENDEDORES_OFICIALES = [
  { nombre: 'Jorge Fazzini' },
  { nombre: 'Jose Castro' },
  { nombre: 'Marta Castro' },
  { nombre: 'Antonio Loisi' },
  { nombre: 'Ines Alonso' },
  { nombre: 'Gisela Buena' },
  { nombre: 'Tomas Bandiera', desde: '2026-05' },   // entró en mayo
  { nombre: 'Julian Naddeo' },
  { nombre: 'TG' },
];

function renderRankingVendedores(delMes, mesKey) {
  // Filtro los oficiales activos para este mes
  const activos = VENDEDORES_OFICIALES.filter(v => !v.desde || v.desde <= mesKey);

  // Inicializo en 0
  const conteo = {};
  for (const v of activos) conteo[v.nombre] = { cantidad: 0, gcia: 0 };

  // No reconocidos: agrupados por nombre crudo
  const otros = {};

  for (const v of delMes) {
    if (v.vendedor && conteo[v.vendedor]) {
      conteo[v.vendedor].cantidad++;
      conteo[v.vendedor].gcia += v.gciaVtaPesos || 0;
    } else if (v.vendedorRaw) {
      const k = v.vendedorRaw;
      if (!otros[k]) otros[k] = { cantidad: 0, gcia: 0 };
      otros[k].cantidad++;
      otros[k].gcia += v.gciaVtaPesos || 0;
    }
  }

  // Ordeno: cantidad desc, después gcia desc, después nombre
  const ranking = activos.map(v => ({ nombre: v.nombre, ...conteo[v.nombre] }))
    .sort((a, b) =>
      b.cantidad - a.cantidad
      || b.gcia - a.gcia
      || a.nombre.localeCompare(b.nombre)
    );

  let html = '<div class="ranking-wrap">';
  html += '  <div class="ranking-head"><h3>🏆 Ranking de vendedores</h3>';
  html += '    <div class="muted">' + delMes.length + ' ' + (delMes.length === 1 ? 'venta' : 'ventas') + ' del mes</div>';
  html += '  </div>';
  html += '  <table class="ranking-tbl">';
  html += '    <thead><tr>'
        + '      <th class="ctr">#</th><th>Vendedor</th>'
        + '      <th class="num">Ventas</th><th class="num">Gcia $</th>'
        + '    </tr></thead><tbody>';
  let pos = 0;
  for (const r of ranking) {
    pos++;
    const cls = r.cantidad === 0 ? 'zero' : (pos === 1 && r.cantidad > 0 ? 'top' : '');
    html += '<tr class="' + cls + '">';
    html += '  <td class="ctr pos">' + pos + '</td>';
    html += '  <td class="vname">' + escapeHtml(r.nombre) + '</td>';
    html += '  <td class="num">' + r.cantidad + '</td>';
    html += '  <td class="num">' + (r.cantidad ? fmtPesos(r.gcia) : '—') + '</td>';
    html += '</tr>';
  }
  html += '    </tbody></table>';

  // Otros (no reconocidos)
  const otrosKeys = Object.keys(otros);
  if (otrosKeys.length) {
    html += '<div class="ranking-otros">'
          + '  <div class="hd">⚠️ Nombres no reconocidos (' + otrosKeys.length + ')</div>'
          + '  <div class="dd">Estos nombres están en la planilla pero no matchean ninguno de los 9 oficiales. Avisame para agregarlos o ajustar la regla de mapeo.</div>'
          + '  <ul>';
    for (const k of otrosKeys.sort((a, b) => otros[b].cantidad - otros[a].cantidad)) {
      const o = otros[k];
      html += '<li><b>' + escapeHtml(k) + '</b> — ' + o.cantidad + ' ' + (o.cantidad === 1 ? 'venta' : 'ventas') + ' · ' + fmtPesos(o.gcia) + '</li>';
    }
    html += '  </ul>';
    html += '</div>';
  }

  html += '</div>';
  return html;
}

function filaVenta(v) {
  let html = '<tr>';
  html += '<td class="ctr" data-label="#">' + (v.ventaNum || '—') + '</td>';
  html += '<td data-label="Fecha PV">' + escapeHtml(v.fechaPvStr || fmtFechaCorta(v.fechaPvIso)) + '</td>';
  html += '<td data-label="# PV">' + escapeHtml(v.preventaNum || '—') + '</td>';
  html += '<td class="num" data-label="Monto FC">' + fmtPesos(v.montoFc) + '</td>';
  html += '<td class="num col-extra" data-label="IVA">' + (v.iva ? fmtPct(v.iva, 1) : '—') + '</td>';
  html += '<td class="num col-extra" data-label="Acc">' + (v.acc ? fmtPesos(v.acc) : (v.accStr || '—')) + '</td>';
  html += '<td class="num col-extra" data-label="Costo hist.">' + fmtPesos(v.costoHist) + '</td>';
  html += '<td class="col-extra" data-label="Serie"><span class="serie">' + escapeHtml(v.serie) + '</span></td>';
  html += '<td data-label="Modelo">' + escapeHtml(v.modelo) + '</td>';
  html += '<td class="col-extra" data-label="Color">' + escapeHtml(v.color) + '</td>';
  html += '<td class="num gcia-pos" data-label="Gcia $">' + fmtPesos(v.gciaVtaPesos) + '</td>';
  html += '<td class="num gcia-pos" data-label="Gcia %">' + fmtPct(v.gciaVtaPct) + '</td>';
  html += '</tr>';
  return html;
}

// =======================================================================
// PATENTAMIENTOS · fetch
// =======================================================================
async function loadPatentamientos(forzar) {
  if (patentData && !forzar) { renderPatentamientos(); return; }

  // Primer pintado: restaurar de localStorage y refrescar en bg.
  if (!patentData && !forzar) {
    const cached = lsCacheGet('patentamientos');
    if (cached) {
      patentData = cached;
      if (!mesSelPat || !cached.meses.find(m => m.mesKey === mesSelPat)) {
        const conMesActual = cached.meses.find(m => m.mesKey === cached.mesActual);
        mesSelPat = conMesActual ? cached.mesActual : (cached.meses[0] ? cached.meses[0].mesKey : '');
      }
      renderPatentamientos();
      const upd = document.getElementById('updatedAtPatent');
      if (upd && cached.updatedAt) upd.textContent = 'Actualizado: ' + new Date(cached.updatedAt).toLocaleString('es-AR');
      _fetchPatentSilent();
      return;
    }
  }

  const btn  = document.getElementById('btnRefreshPatent');
  const wrap = document.getElementById('patentContent');
  if (btn) { btn.disabled = true; btn.textContent = 'Cargando...'; }
  wrap.innerHTML = '<div class="loading"><div class="spinner"></div><div>Cargando patentamientos...</div></div>';

  if (APPS_SCRIPT_URL.indexOf('__APPS_SCRIPT_URL_PENDIENTE__') === 0) {
    wrap.innerHTML = '<div class="errbox"><div class="ttl">⚙️ Falta conectar la planilla</div></div>';
    if (btn) { btn.disabled = false; btn.textContent = 'Actualizar'; }
    return;
  }

  try {
    const url = APPS_SCRIPT_URL + '?token=' + encodeURIComponent(APPS_SCRIPT_TOKEN) + '&tipo=patentamientos' + (forzar ? '&fresh=1' : '');
    const res = await fetch(url);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    if (data && data.error) throw new Error(data.error);
    patentData = data;
    lsCacheSet('patentamientos', data);
    if (!mesSelPat || !data.meses.find(m => m.mesKey === mesSelPat)) {
      const conMesActual = data.meses.find(m => m.mesKey === data.mesActual);
      mesSelPat = conMesActual ? data.mesActual : (data.meses[0] ? data.meses[0].mesKey : '');
    }
    renderPatentamientos();
    const upd = document.getElementById('updatedAtPatent');
    if (upd && data.updatedAt) upd.textContent = 'Actualizado: ' + new Date(data.updatedAt).toLocaleString('es-AR');
  } catch (e) {
    console.error(e);
    wrap.innerHTML = '<div class="errbox"><div class="ttl">⚠️ No se pudieron cargar los patentamientos</div>'
      + '<div>' + escapeHtml(e.message || String(e)) + '</div></div>';
  } finally {
    if (btn) { btn.disabled = false; btn.textContent = 'Actualizar'; }
  }
}

async function _fetchPatentSilent() {
  if (APPS_SCRIPT_URL.indexOf('__APPS_SCRIPT_URL_PENDIENTE__') === 0) return;
  try {
    const url = APPS_SCRIPT_URL + '?token=' + encodeURIComponent(APPS_SCRIPT_TOKEN) + '&tipo=patentamientos&fresh=1';
    const res = await fetch(url);
    if (!res.ok) return;
    const data = await res.json();
    if (data && data.error) return;
    patentData = data;
    lsCacheSet('patentamientos', data);
    if (!mesSelPat || !data.meses.find(m => m.mesKey === mesSelPat)) {
      const conMesActual = data.meses.find(m => m.mesKey === data.mesActual);
      mesSelPat = conMesActual ? data.mesActual : (data.meses[0] ? data.meses[0].mesKey : '');
    }
    renderPatentamientos();
    const upd = document.getElementById('updatedAtPatent');
    if (upd && data.updatedAt) upd.textContent = 'Actualizado: ' + new Date(data.updatedAt).toLocaleString('es-AR');
  } catch { /* silencioso */ }
}

function setMesPat(mesKey)       { mesSelPat = mesKey || ''; renderPatentamientos(); }
function setVendedorFiltroPat(v) { vendedorFiltroPat = v || ''; renderPatentamientos(); }
function toggleVistaResumidaPat(){ vistaResumidaPat = !vistaResumidaPat; renderPatentamientos(); }
function setObjetivoPat(val) {
  const n = parseInt(val, 10);
  if (!isNaN(n) && n >= 0) {
    objetivosPat[mesSelPat] = n;
    saveObjetivosPat();
    renderPatentamientos();
  }
}

// =======================================================================
// PATENTAMIENTOS · render
// =======================================================================
function renderPatentamientos() {
  const wrap = document.getElementById('patentContent');
  if (!patentData || !Array.isArray(patentData.carpetas)) {
    wrap.innerHTML = '<div class="empty">Sin datos.</div>';
    return;
  }

  const todas  = patentData.carpetas;
  const meses  = patentData.meses || [];
  let delMes   = todas.filter(c => c.mesKey === mesSelPat);

  // Filtro por vendedor (drill-down)
  if (vendedorFiltroPat) {
    delMes = delMes.filter(c => c.vendedor === vendedorFiltroPat);
  }

  // KPIs base
  const total       = delMes.length;
  const patentadas  = delMes.filter(c => c.patentada).length;
  const pendientes  = total - patentadas;
  const objetivo    = objetivosPat[mesSelPat] || 0;
  const restanObj   = Math.max(0, objetivo - patentadas);

  // Desgloses (% por grupo)
  const porPatenta = _agruparCount(delMes, c => c.patentaA || '—');     // TG / CLIENTE / REVENTA
  const porAdmin   = _agruparCount(delMes, c => c.admin || '—');
  const porTipo    = _agruparCount(delMes, c => c.tipoCarpeta || '—');  // TRAD / PLAN AHORRO / FINANCIA
  const porRevPart = _agruparCount(delMes, c => c.reventaOParticular || '—');
  const porVend    = _agruparCount(delMes, c => c.vendedor || (c.vendedorRaw || '—'));

  let html = '';

  // ----- Selector de mes + filtro vendedor + vista resumida -----
  html += '<div class="mes-row">';
  html += '  <label for="mesSelPat">Mes:</label>';
  html += '  <select id="mesSelPat" onchange="setMesPat(this.value)">';
  if (!meses.length) {
    html += '    <option value="">— Sin meses cargados —</option>';
  } else {
    for (const m of meses) {
      const sel = m.mesKey === mesSelPat ? ' selected' : '';
      html += '    <option value="' + m.mesKey + '"' + sel + '>' + escapeHtml(m.label) + ' · ' + m.cuenta + '</option>';
    }
  }
  html += '  </select>';

  // Filtro vendedor (drill-down)
  const vendedoresDelMes = Object.keys(_agruparCount(todas.filter(c => c.mesKey === mesSelPat), c => c.vendedor || '')).filter(Boolean);
  html += '  <select id="vendFiltroPat" onchange="setVendedorFiltroPat(this.value)" style="min-width:200px">';
  html += '    <option value="">Todos los vendedores</option>';
  for (const v of vendedoresDelMes.sort()) {
    const sel = v === vendedorFiltroPat ? ' selected' : '';
    html += '    <option value="' + escapeHtml(v) + '"' + sel + '>' + escapeHtml(v) + '</option>';
  }
  html += '  </select>';
  if (vendedorFiltroPat) {
    html += '  <button class="calc-clear" onclick="setVendedorFiltroPat(\'\')" title="Limpiar">✕</button>';
  }
  html += '  <label class="toggle-resumida">'
        + '    <input type="checkbox" ' + (vistaResumidaPat ? 'checked' : '') + ' onchange="toggleVistaResumidaPat()"> Vista resumida'
        + '  </label>';
  html += '</div>';

  if (vendedorFiltroPat) {
    html += '<div class="pat-filterinfo">'
          + '  📊 Viendo solo carpetas de <b>' + escapeHtml(vendedorFiltroPat) + '</b> en ' + escapeHtml((meses.find(m => m.mesKey === mesSelPat)?.label) || mesSelPat)
          + '</div>';
  }

  // ----- KPIs principales + objetivo editable -----
  html += '<div class="cards">';
  html += kpi('Carpetas del mes', total, '', total ? 'good' : '');
  html += kpi('Patentadas', patentadas, total ? Math.round(patentadas / total * 100) + '% del total' : '', patentadas ? 'good' : '');
  html += kpi('Pendientes', pendientes, '', pendientes ? 'warn' : '');
  html += '<div class="card editable">'
        + '  <div class="label">Objetivo del mes</div>'
        + '  <div class="value"><input type="number" min="0" step="1" value="' + objetivo + '" onchange="setObjetivoPat(this.value)" class="kpi-input" /></div>'
        + '  <div class="sub">Faltan <b>' + restanObj + '</b> para llegar</div>'
        + '</div>';
  html += '</div>';

  // ----- Barras de progreso vs objetivo -----
  if (objetivo > 0) {
    const pctPatVsObj = Math.min(100, Math.round((patentadas / objetivo) * 100));
    const pctTotVsObj = Math.min(100, Math.round((total      / objetivo) * 100));
    html += '<div class="pat-progress">';
    html += '  <div class="prow"><div class="lab">Patentadas vs objetivo</div>'
          + '    <div class="bar"><div class="fill good" style="width:' + pctPatVsObj + '%"></div></div>'
          + '    <div class="val">' + patentadas + ' / ' + objetivo + ' (' + pctPatVsObj + '%)</div>'
          + '  </div>';
    html += '  <div class="prow"><div class="lab">Carpetas cargadas vs objetivo</div>'
          + '    <div class="bar"><div class="fill neutral" style="width:' + pctTotVsObj + '%"></div></div>'
          + '    <div class="val">' + total + ' / ' + objetivo + ' (' + pctTotVsObj + '%)</div>'
          + '  </div>';
    html += '</div>';
  }

  // ----- Desgloses % -----
  html += '<div class="desgloses">';
  html += desgloseCard('Quién patenta',     porPatenta, total);
  html += desgloseCard('Reventa / Particular', porRevPart, total);
  html += desgloseCard('Por admin',         porAdmin,   total);
  html += desgloseCard('Tipo de carpeta',   porTipo,    total);
  html += desgloseCard('Por vendedor',      porVend,    total);
  html += '</div>';

  // ----- Tabla -----
  html += '<div class="table-wrap">'
        + '  <div class="table-head">'
        + '    <h3>Carpetas — ' + escapeHtml((meses.find(m => m.mesKey === mesSelPat)?.label) || 'Sin mes') + '</h3>'
        + '    <div class="count">' + delMes.length + ' visibles</div>'
        + '  </div>'
        + '  <div class="table-scroll">'
        + '    <table class="patent-tbl responsive-cards ' + (vistaResumidaPat ? 'resumida' : '') + '">'
        + '      <thead><tr>'
        + '        <th class="ctr">#</th>'
        + '        <th># PV</th>'
        + '        <th class="col-extra">Serie</th>'
        + '        <th class="ctr">Patenta</th>'
        + '        <th class="col-extra">Admin</th>'
        + '        <th class="col-extra">Tipo</th>'
        + '        <th class="col-extra">Rev/Part</th>'
        + '        <th>Vendedor</th>'
        + '        <th class="col-extra">Cliente</th>'
        + '        <th>Modelo</th>'
        + '        <th class="ctr">Fecha pat.</th>'
        + '        <th class="col-extra">Dominio</th>'
        + '      </tr></thead><tbody>';

  if (!delMes.length) {
    html += '<tr><td colspan="12" class="empty">No hay carpetas para este filtro.</td></tr>';
  } else {
    for (const c of delMes) html += filaPatent(c);
  }
  html += '</tbody></table></div></div>';

  wrap.innerHTML = html;
}

function filaPatent(c) {
  const patBadge = c.patentada
    ? '<span class="badge paga">' + escapeHtml(c.fechaPatStr || fmtFechaCorta(c.fechaPatIso)) + '</span>'
    : '<span class="badge impaga">Pendiente</span>';
  const patentaBadge = c.patentaA
    ? '<span class="badge ' + _patentaCls(c.patentaA) + '">' + escapeHtml(c.patentaA) + '</span>'
    : '<span class="muted">—</span>';

  let h = '<tr>';
  h += '<td class="ctr" data-label="#">' + (c.num || '—') + '</td>';
  h += '<td data-label="# PV">' + escapeHtml(c.pv) + '</td>';
  h += '<td class="col-extra" data-label="Serie"><span class="serie">' + escapeHtml(c.serie) + '</span></td>';
  h += '<td class="ctr" data-label="Patenta">' + patentaBadge + '</td>';
  h += '<td class="col-extra" data-label="Admin">' + escapeHtml(c.admin || '—') + '</td>';
  h += '<td class="col-extra" data-label="Tipo">' + escapeHtml(c.tipoCarpeta || '—') + '</td>';
  h += '<td class="col-extra" data-label="Rev/Part">' + escapeHtml(c.reventaOParticular || '—') + '</td>';
  h += '<td data-label="Vendedor">' + escapeHtml(c.vendedor || c.vendedorRaw || '—') + '</td>';
  h += '<td class="col-extra" data-label="Cliente">' + escapeHtml(c.cliente || '—') + '</td>';
  h += '<td data-label="Modelo">' + escapeHtml(c.modelo || '—') + '</td>';
  h += '<td class="ctr" data-label="Fecha pat.">' + patBadge + '</td>';
  h += '<td class="col-extra" data-label="Dominio">' + escapeHtml(c.dominio || '—') + '</td>';
  h += '</tr>';
  return h;
}

function _patentaCls(p) {
  if (p === 'TG')      return 'expo-er';
  if (p === 'CLIENTE') return 'stock';
  if (p === 'REVENTA') return 'expo-in';
  return 'otro';
}

function _agruparCount(arr, keyFn) {
  const o = {};
  for (const x of arr) {
    const k = keyFn(x);
    if (!k && k !== 0) continue;
    o[k] = (o[k] || 0) + 1;
  }
  return o;
}

// Card con bars horizontales: cada key con su cantidad y %
function desgloseCard(titulo, mapCount, total) {
  const items = Object.keys(mapCount).map(k => ({ k: k, n: mapCount[k] }));
  if (!items.length) {
    return '<div class="desg"><div class="hd">' + escapeHtml(titulo) + '</div><div class="empty-mini">—</div></div>';
  }
  items.sort((a, b) => b.n - a.n);
  let h = '<div class="desg"><div class="hd">' + escapeHtml(titulo) + '</div>';
  for (const it of items) {
    const pct = total ? Math.round(it.n / total * 100) : 0;
    h += '<div class="dr">'
       + '  <div class="dr-k">' + escapeHtml(String(it.k)) + '</div>'
       + '  <div class="dr-bar"><div class="dr-fill" style="width:' + pct + '%"></div></div>'
       + '  <div class="dr-v">' + it.n + ' · ' + pct + '%</div>'
       + '</div>';
  }
  h += '</div>';
  return h;
}

// =======================================================================
// FORMAT / UTILS
// =======================================================================
function fmtPesos(n) {
  if (n == null || n === '' || isNaN(n)) return '—';
  if (!n) return '—';
  return '$ ' + Math.round(n).toLocaleString('es-AR');
}
function fmtPct(n, dec) {
  if (n == null || isNaN(n)) return '—';
  return (Math.round(n * 100) / 100).toLocaleString('es-AR', {
    minimumFractionDigits: dec || 1,
    maximumFractionDigits: dec || 2,
  }) + ' %';
}
function fmtNumLite(n) {
  if (n == null || isNaN(n)) return '';
  return (Math.round(n * 10) / 10).toString();
}
function fmtFechaCorta(iso) {
  if (!iso) return '';
  const m = iso.match(/^(\d{4})-(\d{2})-(\d{2})/);
  if (!m) return iso;
  return m[3] + '/' + m[2];
}
function escapeHtml(s) {
  return String(s == null ? '' : s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

// =======================================================================
// INIT
// =======================================================================
(function init() {
  const session = getSharedCookie();
  if (!session || !session.usuario) {
    showGate('Necesitás iniciar sesión en el portal.');
    return;
  }
  if (session._impersonatedBy) {
    showGate('Esta vista no permite sesiones impersonadas.');
    return;
  }
  if (!USUARIOS_PERMITIDOS.includes(session.usuario)) {
    showGate('Tu usuario no tiene acceso a esta vista.');
    return;
  }
  enterApp(session);
})();
